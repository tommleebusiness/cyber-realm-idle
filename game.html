<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Cyber Realm Idle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#0ff;font-family:monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{background:#0d1025;padding:8px;text-align:center;border-bottom:1px solid #0ff3}
header h1{font-size:16px;letter-spacing:3px;text-shadow:0 0 8px #0ff}
.res-bar{display:flex;justify-content:center;gap:12px;padding:5px;background:#0d1025;border-bottom:1px solid #0ff2;font-size:11px;flex-wrap:wrap}
.res-bar span{color:#ffd700;font-weight:bold}
#area{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
#tap-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
#tap-btn{width:120px;height:120px;border-radius:50%;border:2px solid #0ff;background:radial-gradient(circle,#1a2a4a,#0a0a2a);color:#0ff;font-size:14px;cursor:pointer;box-shadow:0 0 20px #0ff4;transition:.08s;display:flex;align-items:center;justify-content:center;font-family:inherit}
#tap-btn:active{transform:scale(.92)}
#tap-btn div{text-align:center}
#tap-btn .big{font-size:28px;display:block}
#tap-info{font-size:10px;color:#0f0;margin:6px 0;min-height:14px}
#cps{font-size:9px;color:#666;margin-bottom:6px}
#prog{width:180px;margin:6px auto}
#prog-bg{background:#1a1a2e;border-radius:3px;height:5px}
#prog-fill{height:100%;background:linear-gradient(90deg,#0ff,#0f0);border-radius:3px;width:0%;transition:.3s}
#prog-t{font-size:9px;color:#666;text-align:center;margin-top:3px}
#panel{overflow-y:auto;padding:8px;border-left:1px solid #0ff2}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#0ff3}
.tabs{display:flex;border-bottom:1px solid #0ff2;margin-bottom:6px}
.tab{flex:1;text-align:center;padding:4px;font-size:9px;cursor:pointer;color:#666;border-bottom:2px solid transparent}
.tab.on{color:#0ff;border-color:#0ff}
.sec{font-size:9px;color:#0ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.up{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.15);border-radius:4px;padding:5px;margin-bottom:3px;cursor:pointer}
.up .h{display:flex;justify-content:space-between;margin-bottom:1px}
.up .nm{font-weight:bold;font-size:10px}
.up .lv{color:#ffd700;font-size:9px}
.up .d{color:#666;font-size:9px}
.up .c{color:#ffd700;font-size:9px}
.up.m{opacity:.3;cursor:default}
#parts{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pt{position:absolute;font-size:11px;color:#0f0;animation:fly 1s forwards}
@keyframes fly{to{opacity:0;transform:translateY(-60px)}}
footer{background:#0d1025;padding:3px;display:flex;justify-content:space-around;border-top:1px solid #0ff2}
.ft{text-align:center;padding:2px 4px;font-size:9px;cursor:pointer;color:#666}
.ft.on{color:#0ff}
</style>
</head>
<body>

<header><h1>⚡ CYBER REALM ⚡</h1></header>

<div class="res-bar">
  💎<span id="rc">0</span>
  ⚡<span id="rn">0</span>
  🧬<span id="rd">0</span>
  🌀<span id="re">0</span>
  💎<span id="rg">0</span><small style="color:#a0f">prem</small>
</div>

<div id="area">
  <div id="tap-zone">
    <div id="parts"></div>
    <button id="tap-btn"><div><span class="big">⚡</span>TAP</div></button>
    <div id="tap-info"></div>
    <div id="cps">per sec: 0</div>
    <div id="prog"><div id="prog-bg"><div id="prog-fill"></div></div><div id="prog-t">Realm Lv.1</div></div>
  </div>

  <div id="panel">
    <div class="tabs">
      <div class="tab on" data-t="up">⬆️</div>
      <div class="tab" data-t="bo">👹</div>
      <div class="tab" data-t="ac">🏆</div>
      <div class="tab" data-t="sh">🛒</div>
    </div>
    <div id="pc"></div>
  </div>
</div>

<footer>
  <div class="ft on" data-v="g">🎮 Game</div>
  <div class="ft" data-v="s">🛒 Shop</div>
  <div class="ft" data-v="i">📊 Stats</div>
  <div class="ft" data-v="c">⚙️ Set</div>
</footer>

<script>
(function(){

// State
var S={c:0,ct:0,n:0,d:0,e:0,g:0,cl:0,bs:0,pr:0,pp:0,cp:1,ps:0,ns:0,ds:0,es:0,gm:1,dm:1,
rl:1,rp:0,rg:100,up:{},ac:[],cb:null,bh:0};

var RN=["Digital Nexus","Neon Grid","Quantum Core","Cyber Hive","Dark Matrix","Void Sector","Inf Loop","Omega Realm","Alpha Sing","Cyber Eden"];

// Upgrades: id, name, desc, cost base, max, fn
var UP=[
{n:"Neural Link",d:"+1 tap",cb:10,fn:function(){S.cp+=1},mx:100},
{n:"Laser Focus",d:"+5 tap",cb:100,fn:function(){S.cp+=5},mx:50},
{n:"Nano Bot",d:"0.5/s",cb:50,fn:function(){S.ps+=0.5},mx:50},
{n:"Drone Swarm",d:"2/s",cb:200,fn:function(){S.ps+=2},mx:30},
{n:"AI Core",d:"10/s",cb:1000,fn:function(){S.ps+=10},mx:20},
{n:"Compressor",d:"x1.5 all",cb:250,fn:function(){S.gm*=1.5},mx:5},
{n:"Solar",d:"+1 ⚡/t",cb:30,fn:function(){S.ns+=1},mx:20},
{n:"Data Miner",d:"+1 🧬/t",cb:25,fn:function(){S.ds+=1},mx:20},
{n:"Encryptor",d:"x2 data",cb:300,fn:function(){S.dm*=2},mx:5},
{n:"Chaos Inj",d:"+1 🌀/t",cb:500,fn:function(){S.es+=1},mx:10},
{n:"Quantum Farm",d:"50/s",cb:5000,fn:function(){S.ps+=50},mx:15},
{n:"Entropy Eng",d:"x2 all",cb:2500,fn:function(){S.gm*=2},mx:3},
];

// Bosses
var BS=[{n:"Glitch",hp:100,cr:50,ic:"👻"},{n:"Golem",hp:500,cr:200,ic:"🗿"},{n:"Swarm",hp:2000,cr:800,ic:"🦠"},{n:"Kraken",hp:8000,cr:3000,ic:"🐙"},{n:"Dragon",hp:30000,cr:12000,ic:"🐉"}];

// Tap
document.getElementById("tap-btn").onclick=function(){
  var v=Math.floor(S.cp*S.gm);
  S.c+=v;S.ct+=v;S.cl++;S.rp+=v;S.n+=S.ns;S.d+=S.ds*S.dm;S.e+=S.es;
  document.getElementById("tap-info").textContent="+"+f(v)+" 💎";
  if(S.cb&&S.bh>0){S.bh-=v;if(S.bh<=0)winBoss();}
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;}
  if(!S.cb&&S.rl>=5&&Math.random()<0.01)sumBoss();
  fly("+"+f(v));
  draw();
};

// Bosses
function sumBoss(){var i=Math.min(Math.floor(S.rl/5),BS.length-1);S.cb=BS[i];S.bh=S.cb.hp;}
function winBoss(){S.c+=S.cb.cr;S.bs++;fly("+"+f(S.cb.cr)+" 💎");S.cb=null;S.bh=0;}

// File system helpers
var fs=(function(){
  var sdb={};
  return{
    read:function(k,def){try{var v=localStorage.getItem("cri_"+k);return v?JSON.parse(v):def;}catch(e){return def;}},
    write:function(k,v){try{localStorage.setItem("cri_"+k,JSON.stringify(v));}catch(e){}}
  };
})();

// Draw
function draw(){
  document.getElementById("rc").textContent=f(S.c);
  document.getElementById("rn").textContent=f(S.n);
  document.getElementById("rd").textContent=f(S.d);
  document.getElementById("re").textContent=f(S.e);
  document.getElementById("rg").textContent=f(S.g);
  document.getElementById("cps").textContent="per sec: "+f(S.ps*S.gm)+" | taps: "+S.cl;
  document.getElementById("prog-fill").style.width=Math.min(100,(S.rp/S.rg)*100)+"%";
  document.getElementById("prog-t").textContent="Realm Lv."+S.rl;
  var t=document.querySelector(".tab.on").dataset.t;
  var p=document.getElementById("pc");
  if(t==="up")drawUp(p);
  else if(t==="bo")drawBoss(p);
  else if(t==="ac")drawAch(p);
  else if(t==="sh")drawShop(p);
}

function drawUp(p){
  var h='<div class="sec">⬆️ Upgrades</div>';
  for(var i=0;i<UP.length;i++){
    var u=UP[i];var o=S.up[i]||0;var mx=o>=u.mx;
    var cost=Math.floor(u.cb*Math.pow(1.15,o));
    var ok=S.c>=cost&&!mx;
    h+='<div class="up'+(mx?' m':'')+'" data-i="'+i+'">';
    h+='<div class="h"><span class="nm">'+u.n+'</span><span class="lv">'+o+'/'+u.mx+'</span></div>';
    h+='<div class="d">'+u.d+'</div>';
    h+='<div class="c'+(ok?' style="color:#0f0"':'')+'">'+(mx?'MAX':f(cost)+'💎')+'</div></div>';
  }
  p.innerHTML=h;
  var els=p.querySelectorAll(".up");
  for(var j=0;j<els.length;j++){
    els[j].onclick=function(e){
      var i=parseInt(this.dataset.i);
      if(this.classList.contains("m"))return;
      var u=UP[i];var o=S.up[i]||0;
      var cost=Math.floor(u.cb*Math.pow(1.15,o));
      if(S.c<cost)return;
      S.c-=cost;S.up[i]=o+1;u.fn();draw();
    };
  }
}

function drawBoss(p){
  if(!S.cb){
    p.innerHTML='<div class="sec">👹 Bosses</div><p style="color:#666;font-size:10px">Reach Realm Lv.5+</p>';
  }else{
    var pct=Math.max(0,(S.bh/S.cb.hp)*100);
    p.innerHTML='<div class="sec">👹 '+S.cb.ic+' '+S.cb.n+'</div>'+
      '<div style="background:#1a1a2e;border-radius:3px;height:6px;margin:4px 0"><div style="width:'+pct+'%;height:100%;background:linear-gradient(90deg,#f04,#ffd700);border-radius:3px"></div></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:9px;color:#666"><span>HP:'+f(S.bh)+'/'+f(S.cb.hp)+'</span><span>'+pct.toFixed(0)+'%</span></div>'+
      '<div style="font-size:10px;color:#ffd700;margin:4px 0">Reward: '+f(S.cb.cr)+' 💎</div>'+
      '<button style="background:#f04;color:#fff;border:none;padding:5px;border-radius:3px;width:100%;cursor:pointer" id="atkBtn">⚔️ ATTACK</button>';
    document.getElementById("atkBtn").onclick=function(){
      var v=Math.floor(S.cp*S.gm);S.bh-=v;S.rp+=v;S.c+=v;S.ct+=v;S.n+=S.ns;S.d+=S.ds*S.dm;S.e+=S.es;
      if(S.bh<=0)winBoss();
      while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;}
      draw();
    };
  }
}

function drawAch(p){
  var achs=[
    {id:"c10",d:"Tap 10 times",ck:function(){return S.cl>=10}},
    {id:"c100",d:"Tap 100 times",ck:function(){return S.cl>=100}},
    {id:"b1",d:"Defeat 1 boss",ck:function(){return S.bs>=1}},
    {id:"b5",d:"Defeat 5 bosses",ck:function(){return S.bs>=5}},
    {id:"r10",d:"Realm Lv.10",ck:function(){return S.rl>=10}},
  ];
  var h='<div class="sec">🏆 Achievements ('+S.ac.length+'/'+achs.length+')</div>';
  for(var i=0;i<achs.length;i++){
    var a=ck[i];var done=S.ac.indexOf(a.id)>=0;
    h+='<div style="display:flex;align-items:center;gap:6px;padding:3px;background:rgba(0,255,255,.03);border-radius:3px;margin-bottom:2px'+(done?';border:1px solid #ffd700':'')+'">';
    h+='<span>'+(done?'✅':'⬜')+'</span><span style="font-size:10px'+(done?';color:#ffd700':'')+'">'+a.d+'</span>';
    h+='</div>';
    if(!done&&a.ck()){S.ac.push(a.id);S.g+=10;}
  }
  p.innerHTML=h;
}

function drawShop(p){
  var h='<div class="sec">🛒 Premium</div>';
  h+='<div class="up"><div class="h"><span class="nm">100 Gems</span><span class="lv">$0.99</span></div><button style="background:#0ff;color:#000;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;margin-top:3px" data-g="100">Buy</button></div>';
  h+='<div class="up"><div class="h"><span class="nm">500 Gems</span><span class="lv">$2.99</span></div><button style="background:#0ff;color:#000;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;margin-top:3px" data-g="500">Buy</button></div>';
  h+='<div class="up"><div class="h"><span class="nm">2000 Gems</span><span class="lv">$9.99</span></div><button style="background:#0ff;color:#000;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;margin-top:3px" data-g="2000">Buy</button></div>';
  p.innerHTML=h;
  p.querySelectorAll("button[data-g]").forEach(function(b){
    b.onclick=function(){S.g+=parseInt(this.dataset.g);draw();};
  });
}

// Save
function save(){localStorage.setItem("cri_save",JSON.stringify(S));}
function load(){
  var d=localStorage.getItem("cri_save");
  if(d){try{var v=JSON.parse(d);for(var k in v)S[k]=v[k];}catch(e){}}
}

// Format
function f(n){if(n>=1e12)return(n/1e12).toFixed(1)+"T";if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e4)return(n/1e3).toFixed(1)+"K";return Math.floor(n);}

function fly(t){
  var p=document.createElement("div");p.className="pt";p.textContent=t;
  p.style.left=(30+Math.random()*40)+"%";p.style.top="40%";
  document.getElementById("parts").appendChild(p);
  setTimeout(function(){p.remove();},900);
}

// Tabs
document.querySelectorAll(".tab").forEach(function(t){
  t.onclick=function(){document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});t.classList.add("on");draw();};
});

// Footer
document.querySelectorAll(".ft").forEach(function(ft){
  ft.onclick=function(){
    document.querySelectorAll(".ft").forEach(function(x){x.classList.remove("on");});
    ft.classList.add("on");
    var v=ft.dataset.v;
    if(v==="g"){draw();}
    else if(v==="s"){document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});document.querySelector("[data-t=sh]").classList.add("on");drawShop(document.getElementById("pc"));}
    else if(v==="i"){
      document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});
      var html='<div class="sec">📊 Stats</div>';
      [["Clicks",S.cl],["Total Credits",f(S.ct)],["Tap Power",f(S.cp)],["Per Sec",f(S.ps*S.gm)],["Realm",S.rl],["Bosses",S.bs],["Gems",S.g]].forEach(function(r){
        html+='<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid rgba(0,255,255,.05)"><span style="color:#666">'+r[0]+'</span><span>'+r[1]+'</span></div>';
      });
      html+='<button style="background:rgba(0,255,255,.2);border:none;color:#0ff;padding:5px;border-radius:3px;width:100%;margin-top:8px;cursor:pointer" id="svBtn">💾 Save</button>';
      html+='<button style="background:rgba(255,0,68,.3);border:none;color:#fff;padding:5px;border-radius:3px;width:100%;margin-top:4px;cursor:pointer" id="rsBtn">🗑️ Reset</button>';
      document.getElementById("pc").innerHTML=html;
      document.getElementById("svBtn").onclick=function(){save();};
      document.getElementById("rsBtn").onclick=function(){localStorage.removeItem("cri_save");location.reload();};
    }
    else if(v==="c"){
      document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});
      var pp=document.getElementById("pc");
      pp.innerHTML='<div class="sec">⚙️ Config</div>'+
        '<button style="background:rgba(0,255,255,.2);border:none;color:#0ff;padding:5px;border-radius:3px;width:100%;margin:4px 0;cursor:pointer" id="exBtn">📤 Export Save</button>'+
        '<button style="background:rgba(0,255,255,.2);border:none;color:#0ff;padding:5px;border-radius:3px;width:100%;margin:4px 0;cursor:pointer" id="imBtn">📥 Import Save</button>'+
        '<button style="background:rgba(255,215,0,.2);border:none;color:#ffd700;padding:5px;border-radius:3px;width:100%;margin:4px 0;cursor:pointer" id="prBtn">🌟 Prestige</button>';
      document.getElementById("exBtn").onclick=function(){prompt("Copy save:",btoa(JSON.stringify(S)));};
      document.getElementById("imBtn").onclick=function(){
        var d=prompt("Paste save:");if(!d)return;
        try{var v=JSON.parse(atob(d));for(var k in v)S[k]=v[k];draw();}catch(e){alert("Invalid");}
      };
      document.getElementById("prBtn").onclick=function(){
        var pts=Math.floor(Math.sqrt(S.ct/1e6)+S.rl*0.5);
        if(pts<1)return;
        if(confirm("Prestige for "+pts+" points?")){
          S.pr++;S.pp+=pts;
          S.c=0;S.ct=0;S.n=0;S.d=0;S.e=0;S.cl=0;
          S.cp=1+S.pp*0.1;S.ps=0;S.gm=1;S.dm=1;S.ns=0;S.ds=0;S.es=0;
          S.rl=1;S.rp=0;S.rg=100;S.up={};S.cb=null;S.bh=0;
          draw();
        }
      };
    }
  };
});

// Loop
setInterval(function(){
  if(S.ps>0){var inc=S.ps*S.gm;S.c+=inc;S.ct+=inc;S.rp+=inc;}
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;}
  if(!S.cb&&S.rl>=5&&Math.random()<0.002)sumBoss();
  draw();
},300);

setInterval(function(){save();},10000);

// Init
load();
draw();

})();
</script>
</body>
</html>
