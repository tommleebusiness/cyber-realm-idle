<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Cyber Realm Idle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#050510;color:#0ff;font-family:'Segoe UI',system-ui,sans-serif;height:100%;overflow:hidden;touch-action:manipulation}
body{display:flex;flex-direction:column;-webkit-user-select:none}
#login-scr{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(0,255,255,.08),transparent 70%)}
#login-scr h1{font-size:2em;letter-spacing:4px;text-shadow:0 0 20px #0ff;margin-bottom:8px}
#login-scr .sub{color:#0f0;font-size:.9em;margin-bottom:20px}
.fld{width:100%;max-width:320px}
.fld input{width:100%;padding:14px;margin-bottom:10px;background:rgba(0,255,255,.05);border:1px solid #0ff3;border-radius:8px;color:#0ff;font-size:16px;outline:none}
.fld input:focus{border-color:#0ff;box-shadow:0 0 12px #0ff3}
.fld input::placeholder{color:#0ff5}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#0ff,#4af);border:none;border-radius:8px;color:#000;font-size:16px;font-weight:bold;cursor:pointer;margin-top:4px}
.btn:active{transform:scale(.96)}
.btn2{width:100%;padding:14px;background:transparent;border:1px solid #0ff5;color:#0ff;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:4px}
.msg{text-align:center;font-size:12px;margin-top:10px;min-height:16px}
.msg.ok{color:#0f0}.msg.err{color:#f04}
#game-scr{display:none;flex-direction:column;height:100%}
header{background:linear-gradient(180deg,#0a1628,#0d1025);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0ff4;flex-shrink:0}
header h1{font-size:14px;letter-spacing:3px;text-shadow:0 0 8px #0ff}
.uinfo{display:flex;align-items:center;gap:8px;font-size:11px}
.uinfo .nm{color:#ffd700;font-weight:bold}
.dot{width:8px;height:8px;border-radius:50%;background:#0f0;display:inline-block;margin-right:4px}
.lout{background:none;border:1px solid #f045;color:#f04;padding:3px 8px;border-radius:3px;font-size:10px;cursor:pointer}
.res{display:flex;justify-content:space-around;padding:5px;background:#0d1025;border-bottom:1px solid #0ff3;flex-shrink:0;font-size:11px;flex-wrap:wrap}
.r{display:flex;align-items:center;gap:3px}
.v{color:#ffd700;font-weight:bold}
.rt{color:#0f0;font-size:9px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#tapz{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}
#parts{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:10}
.pt{position:absolute;font-size:14px;font-weight:bold;animation:fly .8s ease-out forwards;pointer-events:none}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.5)}}
#tpbtn{width:160px;height:160px;border-radius:50%;border:3px solid #0ff;background:radial-gradient(circle at 35% 35%,rgba(0,255,255,.2),#0a0a2a 70%);color:#0ff;font-size:14px;cursor:pointer;box-shadow:0 0 30px rgba(0,255,255,.3),inset 0 0 20px rgba(0,255,255,.1);font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;position:relative;overflow:visible}
#tpbtn .in{text-align:center}
#tpbtn .bg{font-size:38px;display:block;line-height:1}
#tpbtn .tx{font-size:14px;letter-spacing:2px}
#tpbtn.active{transform:scale(.88);box-shadow:0 0 60px rgba(0,255,255,.7)}
#tpbtn.active .bg{transform:scale(1.15)}
#tpinfo{font-size:13px;color:#0f0;margin:6px 0;min-height:18px;text-align:center}
#tcps{font-size:10px;color:#666;text-align:center}
#prog{width:200px;margin:8px auto}
#prog-bg{background:#1a1a2e;border-radius:4px;height:6px;overflow:hidden}
#prog-fi{height:100%;background:linear-gradient(90deg,#0ff,#0f0);border-radius:4px;width:0%;transition:.3s}
#prog-t{text-align:center;font-size:10px;color:#666;margin-top:3px}
footer{display:flex;background:#0d1025;border-top:1px solid #0ff3;flex-shrink:0}
footer .tab{flex:1;text-align:center;padding:10px 4px;font-size:11px;cursor:pointer;color:#555;transition:.15s;-webkit-tap-highlight-color:transparent}
footer .tab.on{color:#0ff;text-shadow:0 0 5px #0ff}
footer .tab:active{background:rgba(0,255,255,.1)}
#panel{position:fixed;top:0;left:0;width:100%;height:100%;background:#050510;z-index:50;display:none;flex-direction:column}
#panel.act{display:flex}
#ph{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid #0ff3;background:#0d1025;min-height:40px}
#ph h2{flex:1;font-size:13px;letter-spacing:2px;text-shadow:0 0 8px #0ff}
#ph button{background:none;border:1px solid #0ff5;color:#0ff;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer}
.ptabs{display:flex;border-bottom:1px solid #0ff2;background:#0d1025;overflow-x:auto;flex-shrink:0}
.ptab{min-width:70px;text-align:center;padding:10px 8px;font-size:12px;cursor:pointer;color:#666;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.ptab.on{color:#0ff;border-color:#0ff}
#pc{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#0ff3;border-radius:2px}
.sec{font-size:10px;color:#0ff;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;margin-top:4px}
.up{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.15);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer}
.up:active{background:rgba(0,255,255,.12)}
.up .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.up .nm{color:#0ff;font-weight:bold;font-size:13px}
.up .lv{color:#ffd700;font-size:11px}
.up .d{color:#777;font-size:11px;margin-bottom:3px}
.up .c{color:#ffd700;font-size:12px}
.up .c.ok{color:#0f0}
.up.m{opacity:.3;cursor:default}
.boss{background:linear-gradient(135deg,rgba(255,0,68,.08),rgba(255,100,0,.06));border:1px solid #f045;border-radius:8px;padding:10px;margin-bottom:6px}
.boss .bn{color:#f04;font-weight:bold;font-size:13px;margin-bottom:3px}
.boss .hp{background:#1a1a2e;border-radius:3px;height:6px;margin:3px 0;overflow:hidden}
.boss .hp-f{height:100%;background:linear-gradient(90deg,#f04,#ff4400);border-radius:3px;transition:.2s}
.boss .st{display:flex;justify-content:space-between;font-size:9px;color:#777}
.boss .rw{color:#ffd700;font-size:10px;margin-top:3px}
.atk-btn{width:100%;padding:10px;margin-top:6px;background:linear-gradient(135deg,#f04,#ff4400);border:none;border-radius:4px;color:#fff;font-weight:bold;font-size:13px;cursor:pointer}
.atk-btn:active{transform:scale(.97)}
.ach{display:flex;align-items:center;gap:6px;padding:6px;background:rgba(0,255,255,.03);border:1px solid rgba(0,255,255,.08);border-radius:4px;margin-bottom:3px}
.ach.do{border-color:#ffd700;background:rgba(255,215,0,.05)}
.ach .ic{font-size:18px}
.ach .inf{flex:1}
.ach .an{font-size:11px;color:#0ff}
.ach .ad{font-size:9px;color:#777}
.ach .ar{color:#ffd700;font-size:9px}
.strow{display:flex;justify-content:space-between;padding:6px 3px;border-bottom:1px solid rgba(0,255,255,.05);font-size:11px}
.strow .sl{color:#777}
.strow .sv{color:#0ff;font-weight:bold}
.shop{background:linear-gradient(135deg,rgba(0,255,255,.05),rgba(170,0,255,.05));border:1px solid #0ff3;border-radius:8px;padding:10px;margin-bottom:6px;text-align:center}
.shop .si{font-size:24px;margin-bottom:3px}
.shop .sn{color:#0ff;font-weight:bold;font-size:13px}
.shop .sd{color:#777;font-size:11px;margin:3px 0}
.shop .sp{color:#ffd700;font-size:14px;font-weight:bold}
.shop button{margin-top:4px;background:linear-gradient(135deg,#0ff,#4af);border:none;color:#000;padding:6px 16px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer}
.danger{background:#f043;border:1px solid #f045;color:#f04;padding:6px;border-radius:4px;font-size:11px;cursor:pointer;margin-top:6px;width:100%}
#chat-scr{display:none;flex-direction:column;height:100%}
#chtabs{display:flex;border-bottom:1px solid #0ff2;flex-shrink:0}
.chtab{flex:1;text-align:center;padding:8px;font-size:11px;cursor:pointer;color:#666;border-bottom:2px solid transparent}
.chtab.on{color:#0ff;border-color:#0ff}
#chmsgs{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.chmsg{margin-bottom:6px;padding:8px;background:rgba(0,255,255,.03);border-radius:6px;border-left:2px solid #0ff}
.chmsg .auth{color:#ffd700;font-weight:bold;font-size:10px}
.chmsg .txt{color:#ccc;font-size:12px;margin-top:2px;word-break:break-word;white-space:pre-wrap}
.chmsg .time{color:#555;font-size:9px;margin-top:2px;text-align:right}
.chmsg.me{border-left-color:#ffd700;background:rgba(255,215,0,.05)}
#chowli{font-size:10px;color:#a0f;text-align:center;padding:4px;display:none;background:rgba(170,0,255,.05)}
#chinp{display:flex;padding:8px;border-top:1px solid #0ff2;gap:6px;flex-shrink:0}
#chinp input{flex:1;padding:10px;background:rgba(0,255,255,.05);border:1px solid #0ff3;border-radius:4px;color:#0ff;font-size:13px;outline:none}
#chinp input:focus{border-color:#0ff}
#chinp button{padding:10px 14px;background:#0ff;border:none;border-radius:4px;color:#000;font-weight:bold;font-size:12px;cursor:pointer}
#bfight{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,16,.95);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#bfight.act{display:flex}
#bfs{font-size:64px;animation:bbounce 1s ease-in-out infinite}
@keyframes bbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#bfn{color:#f04;font-size:18px;font-weight:bold;text-shadow:0 0 12px #f04;margin:10px 0}
.fdmg{position:absolute;font-size:20px;font-weight:bold;color:#f04;animation:fd .8s ease-out forwards;pointer-events:none;z-index:201}
@keyframes fd{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.act{display:flex}
.overlay-box{background:#0d1025;border:1px solid #0ff;border-radius:12px;padding:15px;max-width:320px;width:100%;text-align:center}
.overlay-box h3{color:#0ff;font-size:14px;margin-bottom:8px}
.overlay-box p{color:#888;font-size:12px;margin-bottom:15px;line-height:1.5}
.overlay-box button{background:#0ff;border:none;color:#000;padding:6px 15px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;margin:3px}
@media(max-width:480px){
  header h1{font-size:12px;letter-spacing:2px}
  header{padding:6px 8px}
  .res{font-size:9px;padding:3px}
  .r{flex-direction:column;gap:0;font-size:8px}
  #tpbtn{width:140px;height:140px}
  #tpbtn .bg{font-size:32px}
  #tpbtn .tx{font-size:12px}
  footer .tab{padding:8px 2px;font-size:9px}
  .ptab{min-width:55px;padding:8px 5px;font-size:10px}
}
</style></head><body>

<div id="login-scr">
  <h1>⚡ CYBER REALM ⚡</h1>
  <div class="sub">Футуристическая Idle Игра v3.0</div>
  <div class="fld">
    <input type="text" id="au" placeholder="Имя пользователя" maxlength="20">
    <input type="password" id="ap" placeholder="Пароль" maxlength="30">
    <div class="msg" id="amsg"></div>
    <button class="btn" id="alogin">Войти</button>
    <button class="btn2" id="areg">Регистрация</button>
  </div>
</div>

<div id="game-scr">
  <header><h1>⚡ CYBER REALM ⚡</h1><div class="uinfo"><span class="dot"></span><span class="nm" id="uname"></span><button class="lout" id="lout">Выйти</button></div></header>
  <div class="res">
    <span class="r">💎<span class="v" id="rc">0</span><span class="rt" id="rcR"></span></span>
    <span class="r">⚡<span class="v" id="rn">0</span></span>
    <span class="r">🧬<span class="v" id="rd">0</span></span>
    <span class="r">🌀<span class="v" id="re">0</span></span>
  </div>
  <div id="main"><div id="tapz"><div id="parts"></div><button id="tpbtn"><div class="in"><span class="bg">⚡</span><span class="tx">НАЖМИ</span></div></button><div id="tpinfo"></div><div id="tcps">в сек: 0 | тапов: 0</div><div id="prog"><div id="prog-bg"><div id="prog-fi"></div></div><div id="prog-t">Рейм ур.1 — Цифровой Нексус</div></div></div></div>
  <footer>
    <div class="tab on" id="tgame"><div style="font-size:18px">🎮</div><div>Игра</div></div>
    <div class="tab" id="tup"><div style="font-size:18px">⬆️</div><div>Улучш.</div></div>
    <div class="tab" id="tbo"><div style="font-size:18px">👹</div><div>Боссы</div></div>
    <div class="tab" id="tch"><div style="font-size:18px">💬</div><div>Чат</div></div>
    <div class="tab" id="tst"><div style="font-size:18px">⚙️</div><div>Ещё</div></div>
  </footer>
</div>

<div id="panel"><div id="ph"><h2 id="ptitle">⬆️ Улучшения</h2><button id="pcan">✕</button></div><div id="ptabs"><div class="ptab on" data-t="up">⬆️</div><div class="ptab" data-t="bo">👹</div><div class="ptab" data-t="ac">🏆</div><div class="ptab" data-t="qu">📜</div><div class="ptab" data-t="sh">🛒</div></div><div id="pc"></div></div>

<div id="chat-scr">
  <header><h1>💬 Чат</h1><button class="lout" id="cback">✕</button></header>
  <div id="chtabs"><div class="chtab on" data-ct="g">🌍 Общий</div><div class="chtab" data-ct="o">🦉 OWL</div></div>
  <div id="chmsgs"></div>
  <div id="chowli">🦉 OWL думает...</div>
  <div id="chinp"><input type="text" id="chin" placeholder="Сообщение или задание для OWL..." maxlength="200"><button id="chsend">→</button></div>
</div>

<div id="bfight"><div id="bfs">👹</div><div id="bfn">Босс</div><div style="width:200px;background:#1a1a2e;border-radius:3px;height:8px;overflow:hidden;margin:8px 0"><div id="bf-hp" style="width:100%;height:100%;background:linear-gradient(90deg,#f04,#ff4400);border-radius:3px;transition:.2s"></div></div><div style="display:flex;justify-content:space-between;font-size:10px;color:#888;width:200px"><span id="bftext">HP: 100/100</span></div><button class="atk-btn" id="bfatk">⚔️ АТАКОВАТЬ</button></div>

<div class="overlay" id="ov"><div class="overlay-box"><h3 id="ovt"></h3><p id="ovp"></p><div id="ovb"></div></div></div>

<script>
(function(){
"use strict";

// AUTH
var curUser=null,users={};
try{users=JSON.parse(localStorage.getItem("cr_users")||"{}");}catch(e){}
function saveUsers(){localStorage.setItem("cr_users",JSON.stringify(users));}
function hsh(p){var h=0;for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}
function $(id){return document.getElementById(id);}
function showScr(id){$("login-scr").style.display="none";$("game-scr").style.display="none";$("chat-scr").style.display="none";$(id+"-scr").style.display="flex";}
function amsg(m,t){var e=$("amsg");e.textContent=m;e.className="msg "+(t||"");}

$("alogin").onclick=function(){
  var u=$("au").value.trim(),p=$("ap").value;
  if(!u||!p){amsg("Заполни все поля","err");return;}
  if(!users[u]){amsg("Пользователь не найден","err");return;}
  if(users[u].pass!==hsh(p)){amsg("Неверный пароль","err");return;}
  curUser=u;users[u].lastLogin=Date.now();saveUsers();
  loadGame();showScr("game");amsg("","");
};
$("areg").onclick=function(){
  var u=$("au").value.trim(),p=$("ap").value;
  if(!u||!p){amsg("Заполни все поля","err");return;}
  if(u.length<3){amsg("Минимум 3 символа","err");return;}
  if(p.length<4){amsg("Минимум 4 символа пароля","err");return;}
  if(users[u]){amsg("Имя занято","err");return;}
  users[u]={pass:hsh(p),created:Date.now(),lastLogin:Date.now()};saveUsers();
  curUser=u;initNewGame();showScr("game");amsg("Аккаунт создан!","ok");
};
$("lout").onclick=function(){saveGame();curUser=null;showScr("login");};
$("cback").onclick=function(){showScr("game");};

// GAME STATE
var S={c:0,ct:0,n:0,d:0,e:0,g:0,cl:0,bs:0,pr:0,pp:0,cp:1,ps:0,ns:0,ds:0,es:0,gm:1,dm:1,rl:1,rp:0,rg:100,up:{},ac:[],cb:null,bh:0,lastSave:Date.now()};
var RN=["Цифровой Нексус","Неоновая Сетка","Квантовое Ядро","Кибер-Улей","Тёмная Матрица","Пустотный Сектор","Бесконечный Цикл","Омега-Царство","Альфа-Сингулярность","Кибер-Эдем","Нейросеть","Фантомная Зона","Бинарный Шторм","Хромовая Пустота","Океан Данных","Пустотное Ядро"];
var UPG=[
  {n:"Нейро-Связь",d:"+1 тап",cb:10,fn:function(){S.cp+=1},mx:100},
  {n:"Лазерный Фокус",d:"+5 тапов",cb:100,fn:function(){S.cp+=5},mx:50},
  {n:"Плазменное Ядро",d:"+25 тапов",cb:1000,fn:function(){S.cp+=25},mx:30},
  {n:"Нано-Бот",d:"+0.5/с",cb:50,fn:function(){S.ps+=0.5},mx:50},
  {n:"Рой Дронов",d:"+2/с",cb:200,fn:function(){S.ps+=2},mx:30},
  {n:"ИИ-Ядро",d:"+10/с",cb:1000,fn:function(){S.ps+=10},mx:20},
  {n:"Квантовая Ферма",d:"+50/с",cb:5000,fn:function(){S.ps+=50},mx:15},
  {n:"Компрессор",d:"x1.5 всё",cb:250,fn:function(){S.gm*=1.5},mx:5},
  {n:"Энтропия",d:"x2 всё",cb:2500,fn:function(){S.gm*=2},mx:3},
  {n:"Солнечная Панель",d:"+1 ⚡/тап",cb:30,fn:function(){S.ns+=1},mx:20},
  {n:"Дата-Майнер",d:"+1 🧬/тап",cb:25,fn:function(){S.ds+=1},mx:20},
  {n:"Шифратор",d:"x2 данные",cb:300,fn:function(){S.dm*=2},mx:5},
  {n:"Инжектор Хаоса",d:"+1 🌀/тап",cb:500,fn:function(){S.es+=1},mx:10}
];
var BS=[
  {n:"Глитч-Фантом",hp:100,cr:50,ic:"👻"},
  {n:"Фаервол-Голем",hp:500,cr:200,ic:"🗿"},
  {n:"Вирусный Рой",hp:2000,cr:800,ic:"🦠"},
  {n:"Дата-Кракен",hp:8000,cr:3000,ic:"🐙"},
  {n:"Квантовый Дракон",hp:30000,cr:12000,ic:"🐉"},
  {n:"Нейро-Владыка",hp:100000,cr:50000,ic:"🧠"},
  {n:"Пустотный Император",hp:500000,cr:200000,ic:"👑"},
  {n:"Омега-Сингулярность",hp:2e6,cr:1e6,ic:"🌀"}
];
var ACHS=[
  {id:"a1",n:"Первый Тап",d:"Нажми один раз",i:"👆",ck:function(){return S.cl>=1}},
  {id:"a2",n:"Кликер",d:"Нажми 100 раз",i:"🖱️",ck:function(){return S.cl>=100}},
  {id:"a3",n:"Богач",d:"Заработай 10 000",i:"💰",ck:function(){return S.ct>=1e4}},
  {id:"a4",n:"Убийца Боссов",d:"Победи 1 босса",i:"⚔️",ck:function(){return S.bs>=1}},
  {id:"a5",n:"Охотник",d:"Победи 10 боссов",i:"🏆",ck:function(){return S.bs>=10}},
  {id:"a6",n:"Странник",d:"Рейм ур.10",i:"🌌",ck:function(){return S.rl>=10}},
  {id:"a7",n:"Престиж",d:"Престиж 1 раз",i:"🌟",ck:function(){return S.pr>=1}},
  {id:"a8",n:"Демон Скорости",d:"100/с доход",i:"🚀",ck:function(){return getCPS()>=100}}
];

function getCPS(){return S.ps*S.gm;}
function fmt(n){if(n>=1e12)return(n/1e12).toFixed(1)+"T";if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e4)return(n/1e3).toFixed(1)+"K";return Math.floor(n);}

// TAP
var tpBtn=$("tpbtn");
function doTap(){
  var v=Math.floor(S.cp*S.gm);
  S.c+=v;S.ct+=v;S.cl++;S.rp+=v;S.n+=S.ns;S.d+=S.ds*S.dm;S.e+=S.es;
  $("tpinfo").textContent="+"+fmt(v)+" 💎";
  tpBtn.classList.add("active");setTimeout(function(){tpBtn.classList.remove("active");},120);
  if(S.cb&&S.bh>0){S.bh-=v;if(S.bh<=0)winBoss();}
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;lvlUp(S.rl);}
  if(!S.cb&&S.rl>=5&&Math.random()<0.01)spawnBoss();
  chkAch();fly("+ "+fmt(v));draw();
}
tpBtn.addEventListener("touchstart",function(e){e.preventDefault();doTap();},{passive:false});
tpBtn.addEventListener("mousedown",function(e){e.preventDefault();doTap();});

function spawnBoss(){var i=Math.min(Math.floor(S.rl/5),BS.length-1);S.cb=BS[i];S.bh=S.cb.hp;showBoss();}
function winBoss(){var r=Math.floor(S.cb.cr*S.gm);S.c+=r;S.bs++;fly("+ "+fmt(r)+" 💎");S.cb=null;S.bh=0;chkAch();hideBoss();}
function lvlUp(lv){$("ovt").textContent="🌀 УРОВЕНЬ!";$("ovp").textContent="Рейм уровень "+lv+" — "+RN[Math.min(lv-1,RN.length-1)];$("ovb").innerHTML="<button onclick=\"document.getElementById('ov').classList.remove('act')\">OK</button>";$("ov").classList.add("act");}
function chkAch(){for(var i=0;i<ACHS.length;i++){var a=ACHS[i];if(S.ac.indexOf(a.id)<0&&a.ck()){S.ac.push(a.id);S.g+=10;}}}

function showBoss(){$("bfight").classList.add("act");$("bfs").textContent=S.cb.ic;$("bfn").textContent=S.cb.n;updateBossHP();}
function hideBoss(){$("bfight").classList.remove("act");}
function updateBossHP(){var pct=Math.max(0,(S.bh/S.cb.hp)*100);$("bf-hp").style.width=pct+"%";$("bftext").textContent="HP: "+fmt(S.bh)+" / "+fmt(S.cb.hp);}
$("bfatk").onclick=function(){
  var v=Math.floor(S.cp*S.gm);S.bh-=v;S.rp+=v;S.c+=v;S.ct+=v;S.n+=S.ns;S.d+=S.ds*S.dm;S.e+=S.es;
  var dmg=document.createElement("div");dmg.className="fdmg";dmg.textContent="-"+fmt(v);dmg.style.left=(30+Math.random()*40)+"%";dmg.style.top="30%";$("bfight").appendChild(dmg);setTimeout(function(){dmg.remove();},800);
  if(S.bh<=0)winBoss();else updateBossHP();
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;}
  draw();
};

function draw(){
  $("rc").textContent=fmt(S.c);$("rn").textContent=fmt(S.n);$("rd").textContent=fmt(S.d);$("re").textContent=fmt(S.e);
  $("rcR").textContent=getCPS()>0?"+"+fmt(getCPS())+"/с":"";
  $("tcps").textContent="в сек: "+fmt(getCPS())+" | тапов: "+fmt(S.cl);
  $("prog-fi").style.width=Math.min(100,(S.rp/S.rg)*100)+"%";
  $("prog-t").textContent="Рейм ур."+S.rl+" — "+RN[Math.min(S.rl-1,RN.length-1)];
  $("uname").textContent=curUser||"";
}
function fly(t){var p=document.createElement("div");p.className="pt";p.textContent=t;p.style.left=(30+Math.random()*40)+"%";p.style.top="40%";$("parts").appendChild(p);setTimeout(function(){p.remove();},800);}

// PANEL
var curTab="up";
$("pcan").onclick=function(){$("panel").classList.remove("act");};
$("ptabs").addEventListener("click",function(e){var t=e.target.closest(".ptab");if(!t)return;$("ptabs").querySelectorAll(".ptab").forEach(function(x){x.classList.remove("on");});t.classList.add("on");curTab=t.dataset.t;renderP();});

function renderP(){
  var p=$("pc");p.innerHTML="";
  if(curTab==="up")renderUp(p);
  else if(curTab==="bo")renderBossPanel(p);
  else if(curTab==="ac")renderAch(p);
  else if(curTab==="qu")renderQuest(p);
  else if(curTab==="sh")renderShop(p);
}

function renderUp(p){
  p.innerHTML='<div class="sec">⬆️ Улучшения</div>';
  for(var i=0;i<UPG.length;i++){
    var u=UPG[i],o=S.up[i]||0,mx=o>=u.mx,cost=Math.floor(u.cb*Math.pow(1.15,o)),ok=S.c>=cost&&!mx;
    p.innerHTML+='<div class="up'+(mx?' m':'')+'" data-i="'+i+'"><div class="h"><span class="nm">'+u.n+'</span><span class="lv">'+o+'/'+u.mx+'</span></div><div class="d">'+u.d+'</div><div class="c'+(ok?' ok':'')+'">'+(mx?'МАКС':fmt(cost)+' 💎')+'</div></div>';
  }
  p.querySelectorAll(".up").forEach(function(el){
    el.onclick=function(){if(el.classList.contains("m"))return;var i=parseInt(el.dataset.i),u=UPG[i],o=S.up[i]||0,cost=Math.floor(u.cb*Math.pow(1.15,o));if(S.c<cost)return;S.c-=cost;S.up[i]=o+1;u.fn();chkAch();renderP();draw();};
  });
}

function renderBossPanel(p){
  if(!S.cb){p.innerHTML='<div class="sec">👹 Боссы</div><div style="color:#777;font-size:11px;margin:8px 0">Доберись до Рейм ур.5+</div><button class="atk-btn" id="sb">⚔️ Призвать босса</button>';$("sb").onclick=function(){spawnBoss();};}
  else{var pct=Math.max(0,(S.bh/S.cb.hp)*100);p.innerHTML='<div class="sec">👹 '+S.cb.ic+' '+S.cb.n+'</div><div class="boss hp"><div class="boss hp-f" style="width:'+pct+'%"></div></div><div class="boss st"><span>HP: '+fmt(S.bh)+' / '+fmt(S.cb.hp)+'</span><span>'+pct.toFixed(0)+'%</span></div><div class="boss rw">Награда: '+fmt(S.cb.cr)+' 💎</div><button class="atk-btn" id="abtn">⚔️ АТАКОВАТЬ</button>';$("abtn").onclick=function(){var v=Math.floor(S.cp*S.gm);S.bh-=v;S.rp+=v;S.c+=v;S.ct+=v;S.n+=S.ns;S.d+=S.ds*S.dm;S.e+=S.es;if(S.bh<=0)winBoss();else renderBossPanel($("pc"));draw();};}
}

function renderAch(p){
  p.innerHTML='<div class="sec">🏆 Достижения ('+S.ac.length+'/'+ACHS.length+')</div>';
  for(var i=0;i<ACHS.length;i++){var a=ACHS[i],done=S.ac.indexOf(a.id)>=0;p.innerHTML+='<div class="ach'+(done?' do':'')+'"><span class="ic">'+(done?'✅':a.i)+'</span><div class="inf"><div class="an">'+a.n+'</div><div class="ad">'+a.d+'</div></div>'+(done?'<span class="ar">Получено</span>':'<span class="ar">💎10</span>')+'</div>';}
}

function renderQuest(p){
  if(!S.quests||!S.quests.length){S.quests=[{id:"q1",n:"Нажми 50 раз",d:"Сделай 50 тапов",ck:function(){return S.cl>=50},rw:5},{id:"q2",n:"Заработай 5K",d:"Собери 5000 кредитов",ck:function(){return S.ct>=5000},rw:10},{id:"q3",n:"Победи 3 босса",d:"Убей 3 боссов",ck:function(){return S.bs>=3},rw:15}];}
  p.innerHTML='<div class="sec">📜 Задания</div>';
  for(var i=0;i<S.quests.length;i++){var q=S.quests[i],done=q.ck();p.innerHTML+='<div class="up"><div class="h"><span class="nm">'+q.n+'</span>'+(done?'<span class="lv">✅</span>':'')+'</div><div class="d">'+q.d+'</div>'+(done?'<button data-qid="'+q.id+'" style="margin-top:4px;width:100%;background:#a0f;border:none;color:#fff;padding:6px;border-radius:3px;cursor:pointer">Забрать '+q.rw+' 💎</button>':'')+'</div>';}
  p.querySelectorAll("[data-qid]").forEach(function(b){b.onclick=function(){var q=S.quests.find(function(x){return x.id===b.dataset.qid});if(!q||!q.ck())return;S.g+=q.rw;S.quests=S.quests.filter(function(x){return x.id!==q.id;});renderP();draw();};});
}

function renderShop(p){
  p.innerHTML='<div class="sec">🛒 Магазин</div>';
  var items=[{n:"Стартовый",d:"100 Гемов",p:"$0.99",g:100},{n:"Про",d:"500 Гемов + x2/ч",p:"$2.99",g:500},{n:"Мега",d:"2000 Гемов + x3/ч",p:"$9.99",g:2000},{n:"VIP",d:"x1.5 навсегда + 1000💎",p:"$19.99",g:1000}];
  for(var i=0;i<items.length;i++){var it=items[i];p.innerHTML+='<div class="shop"><div class="si">💎</div><div class="sn">'+it.n+'</div><div class="sd">'+it.d+'</div><div class="sp">'+it.p+'</div><button data-g="'+it.g+'">Купить</button></div>';}
  p.querySelectorAll("[data-g]").forEach(function(b){b.onclick=function(){S.g+=parseInt(b.dataset.g);fly("+ "+fmt(parseInt(b.dataset.g))+" гемов");draw();};});
}

function renderSettings(){
  $("ptitle").textContent="⚙️ Ещё";$("ptabs").style.display="none";
  var p=$("pc");
  var h='<div class="sec">⚙️ Настройки</div>';
  [["Пользователь",curUser],["Тапов",fmt(S.cl)],["Всего кредитов",fmt(S.ct)],["Рейм уровень",S.rl],["Боссов убито",S.bs],["Престиж",S.pr],["Гемы",S.g]].forEach(function(r){h+='<div class="strow"><span class="sl">'+r[0]+'</span><span class="sv">'+r[1]+'</span></div>';});
  h+='<button class="btn" id="prBtn" style="background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;cursor:pointer">🌟 Престиж</button>';
  h+='<button class="btn" style="margin-top:6px;background:rgba(0,255,255,.1);border:1px solid #0ff3;color:#0ff;cursor:pointer" id="exBtn">📤 Экспорт</button>';
  h+='<button class="btn" style="margin-top:6px;background:rgba(0,255,255,.1);border:1px solid #0ff3;color:#0ff;cursor:pointer" id="imBtn">📥 Импорт</button>';
  h+='<button class="danger" id="dlBtn" style="margin-top:6px">🗑️ Удалить всё</button>';
  p.innerHTML=h;
  $("prBtn").onclick=function(){var pts=Math.floor(Math.sqrt(S.ct/1e6)+S.rl*0.5);if(pts<1)return;dlg("🌟 Престиж","Сбросить за "+pts+" очков?\nБонус: +"+Math.floor(pts*10)+"% к тапу",[{t:"Отмена",f:function(){cdlg();}},{t:"Престиж!",f:function(){doPres();}}]);};
  $("exBtn").onclick=function(){prompt("Скопируй код:",btoa(JSON.stringify(S)));};
  $("imBtn").onclick=function(){var d=prompt("Вставь код:");if(!d)return;try{Object.assign(S,JSON.parse(atob(d)));save();$("panel").classList.remove("act");draw();}catch(e){alert("Неверный код");}};
  $("dlBtn").onclick=function(){dlg("Удалить ВСЁ?","Нельзя отменить!",[{t:"Отмена",f:function(){cdlg();}},{t:"УДАЛИТЬ",f:function(){localStorage.clear();location.reload();}}]);};
}

function doPres(){
  var pts=Math.floor(Math.sqrt(S.ct/1e6)+S.rl*0.5);
  if(pts<1){cdlg();return;}
  S.pr++;S.pp+=pts;S.c=0;S.ct=0;S.n=0;S.d=0;S.e=0;S.cl=0;
  S.cp=1+S.pp*0.1;S.ps=0;S.gm=1;S.dm=1;S.ns=0;S.ds=0;S.es=0;
  S.rl=1;S.rp=0;S.rg=100;S.up={};S.cb=null;S.bh=0;
  cdlg();$("panel").classList.remove("act");draw();
}

// CHAT
var chatTab="g",chatMsgs=[];
try{chatMsgs=JSON.parse(localStorage.getItem("cr_chat")||"[]");}catch(e){}
function saveChat(){localStorage.setItem("cr_chat",JSON.stringify(chatMsgs.slice(-200)));}
function addMsg(author,text){chatMsgs.push({a:author,t:text,ts:Date.now()});saveChat();renderChat();}

function owlReply(text){
  var L=text.toLowerCase(),r="";
  if(L.indexOf("босс")>=0){var bn=["Пустотный","Небулярный","Квазаровый","Пульсарный","Тёмный"];var bi=["🌌","🌠","⚡","🔮","💫"];var i=Math.floor(Math.random()*bn.length);var hp=Math.floor(5e4*Math.pow(1.8,BS.length));BS.push({n:bn[i]+" Владыка",hp:hp,cr:Math.floor(hp*.4),ic:bi[i]});r="✅ Босс создан!\n👹 "+bn[i]+" Владыка\n❤️ HP: "+fmt(hp)+"\n💰 Награда: "+fmt(Math.floor(hp*.4))+"💎\nВсего боссов: "+BS.length;}
  else if(L.indexOf("улучшен")>=0||L.indexOf("апгрейд")>=0){var un=["Квантовый Ускоритель","Нейро-Усилитель","Плазменный Инжектор"];var i=Math.floor(Math.random()*un.length);var c=Math.floor(100*Math.pow(2,UPG.length));UPG.push({n:un[i],d:"+10% доход",cb:c,fn:function(){S.gm*=1.1},mx:3});r="✅ Улучшение добавлено!\n⚡ "+un[i]+"\nЦена: "+fmt(c)+"💎\nУлучшений: "+UPG.length;}
  else if(L.indexOf("кредит")>=0||L.indexOf("монет")>=0||L.indexOf("денег")>=0){var a=500+Math.floor(Math.random()*2000);S.c+=a;S.ct+=a;r="💰 Начислено "+fmt(a)+" кредитов!\nБаланс: "+fmt(S.c)+"💎";}
  else if(L.indexOf("уровень")>=0||L.indexOf("рейм")>=0){var lv=1+Math.floor(Math.random()*3);S.rl+=lv;r="🌀 Рейм повышен на "+lv+"!\nУровень: "+S.rl+"\nДо следующего: "+fmt(S.rg-S.rp)+"💎";}
  else if(L.indexOf("гем")>=0||L.indexOf("премиум")>=0){var g=20+Math.floor(Math.random()*80);S.g+=g;r="💎 Начислено "+g+" гемов!\nБаланс: "+S.g+"💎";}
  else if(L.indexOf("баг")>=0||L.indexOf("ошибк")>=0||L.indexOf("не работа")>=0){S.c+=1e3;S.g+=50;S.cp+=5;r="🐛 Баги исправлены!\n\nПатчи:\n✅ Кнопки на мобильных\n✅ Панель улучшений\n✅ Чат OWL\n✅ Сохранение\n\nБонус: +1000💎 +50💎гемов +5 тап";}
  else if(L.indexOf("привет")>=0||L.indexOf("хай")>=0){r="👋 Привет, "+curUser+"!\nЯ — OWL 🦉, ИИ-разработчик.\n\n📌 Команды:\n• Добавь босса\n• Добавь улучшение\n• Дай кредитов/гемов\n• Повысь уровень\n• Исправь баги\n\nКаждая команда = бонус! 🎁";}
  else{S.c+=300;S.g+=10;r="✅ Принято! Бонус: +300💎 +10💎гемов\n\nБаланс: "+fmt(S.c)+"💎 | Гемы: "+S.g;}
  addMsg("🦉 OWL",r,false);draw();
}

function renderChat(){
  var e=$("chmsgs");e.innerHTML="";
  for(var i=0;i<chatMsgs.length;i++){
    var m=chatMsgs[i],d=new Date(m.ts),t=d.toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"});
    var isOwl=(m.a==="🦉 OWL");
    e.innerHTML+='<div class="chmsg'+(isOwl?"":" me")+'"><div class="auth">'+m.a+'</div><div class="txt" style="white-space:pre-wrap">'+m.t+'</div><div class="time">'+t+'</div></div>';
  }
  if(!chatMsgs.length)e.innerHTML='<div style="text-align:center;color:#555;padding:20px">Сообщений пока нет</div>';
  e.scrollTop=e.scrollHeight;
}

function sendChat(){
  var text=$("chin").value.trim();
  if(!text)return;$("chin").value="";
  addMsg(curUser,text);
  if(chatTab==="o"){$("chowli").style.display="block";setTimeout(function(){$("chowli").style.display="false";owlReply(text);},800+Math.random()*1200);}
}

$("chsend").onclick=sendChat;
$("chin").addEventListener("keydown",function(e){if(e.key==="Enter")sendChat();});
$("chtabs").addEventListener("click",function(e){
  var t=e.target.closest(".chtab");if(!t)return;$("chtabs").querySelectorAll(".chtab").forEach(function(x){x.classList.remove("on");});
  t.classList.add("on");chatTab=t.dataset.ct;$("chin").placeholder=chatTab==="o"?"Задание для OWL...":"Сообщение...";renderChat();
});

// NAV
document.querySelectorAll("footer .tab").forEach(function(ft){
  ft.onclick=function(){
    document.querySelectorAll("footer .tab").forEach(function(x){x.classList.remove("on");});
    ft.classList.add("on");showScr("game");$("panel").classList.remove("act");
    var v=ft.id;
    if(v==="tup"){$("ptitle").textContent="⬆️ Улучшения";$("ptabs").style.display="";curTab="up";$("ptabs").querySelectorAll(".ptab").forEach(function(t){t.classList.toggle("on",t.dataset.t==="up");});$("panel").classList.add("act");renderP();}
    else if(v==="tbo"){$("ptitle").textContent="👹 Босс";$("ptabs").style.display="";curTab="bo";$("ptabs").querySelectorAll(".ptab").forEach(function(t){t.classList.toggle("on",t.dataset.t==="bo");});$("panel").classList.add("act");renderP();}
    else if(v==="tch"){showScr("chat");renderChat();}
    else if(v==="tst"){$("ptitle").textContent="⚙️ Ещё";$("ptabs").style.display="none";$("panel").classList.add("act");renderSettings();}
  };
});

// OVERLAY
function dlg(t,p,bs){$("ovt").textContent=t;$("ovp").textContent=p;$("ovb").innerHTML="";for(var i=0;i<bs.length;i++){var b=document.createElement("button");b.textContent=bs[i].t;b.onclick=bs[i].f;$("ovb").appendChild(b);}$("ov").classList.add("act");}
function cdlg(){$("ov").classList.remove("act");}

// SAVE/LOAD
function save(){
  if(!curUser)return;S.lastSave=Date.now();
  var saves={};try{saves=JSON.parse(localStorage.getItem("cr_saves")||"{}");}catch(e){}
  saves[curUser]=JSON.stringify(S);localStorage.setItem("cr_saves",JSON.stringify(saves));
  localStorage.setItem("cr_lastUser",curUser);
}
function loadGame(){
  if(!curUser)return;
  try{var saves=JSON.parse(localStorage.getItem("cr_saves")||"{}");var d=saves[curUser];if(d){var v=JSON.parse(d);for(var k in v)S[k]=v[k];}}catch(e){}
}
function initNewGame(){S={c:0,ct:0,n:0,d:0,e:0,g:0,cl:0,bs:0,pr:0,pp:0,cp:1,ps:0,ns:0,ds:0,es:0,gm:1,dm:1,rl:1,rp:0,rg:100,up:{},ac:[],cb:null,bh:0,lastSave:Date.now()};}

// AUTO SAVE
window.addEventListener("beforeunload",function(){save();});
window.addEventListener("visibilitychange",function(){if(document.hidden)save();});
setInterval(function(){save();},10000);

// LOOP
setInterval(function(){
  if(getCPS()>0){var inc=getCPS()*0.3;S.c+=inc;S.ct+=inc;S.rp+=inc;}
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;}
  draw();
},300);

// INIT
var lastUser=localStorage.getItem("cr_lastUser");
if(lastUser&&users[lastUser]){curUser=lastUser;loadGame();showScr("game");}else{showScr("login");}
draw();

})();
</script>
</body>
</html>
