<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a1a">
<title>Cyber Realm Idle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a1a;color:#0ff;font-family:'Segoe UI',system-ui,sans-serif;height:100%;overflow:hidden}
body{display:flex;flex-direction:column;touch-action:manipulation;-webkit-user-select:none}
header{background:linear-gradient(180deg,#0a1628,#0d1025);padding:10px;text-align:center;border-bottom:2px solid #0ff4;flex-shrink:0}
header h1{font-size:18px;letter-spacing:4px;text-shadow:0 0 12px #0ff}
.res-bar{display:flex;justify-content:space-around;padding:6px;background:#0d1025;border-bottom:1px solid #0ff3;flex-shrink:0;font-size:12px;flex-wrap:wrap}
.r{display:flex;align-items:center;gap:3px}
.v{color:#ffd700;font-weight:bold}
.rate{color:#0f0;font-size:10px}
#area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#tap-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}
#tap-btn{width:160px;height:160px;border-radius:50%;border:3px solid #0ff;
background:radial-gradient(circle at 35% 35%,rgba(0,255,255,.15),#0a0a2a 70%);
color:#0ff;font-size:16px;cursor:pointer;
box-shadow:0 0 30px rgba(0,255,255,.3),inset 0 0 20px rgba(0,255,255,.1);
font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#tap-btn:active{transform:scale(.9);box-shadow:0 0 50px rgba(0,255,255,.6)}
#tap-btn div{text-align:center}
#tap-btn .big{font-size:40px;display:block;line-height:1}
#tap-info{font-size:13px;color:#0f0;margin:8px 0;min-height:20px;text-align:center}
#cps{font-size:11px;color:#666;text-align:center}
#prog{width:220px;margin:10px auto}
#prog-bg{background:#1a1a2e;border-radius:4px;height:8px;overflow:hidden}
#prog-fill{height:100%;background:linear-gradient(90deg,#0ff,#0f0);border-radius:4px;width:0%;transition:.3s}
#prog-t{text-align:center;font-size:11px;color:#666;margin-top:4px}
#parts{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.pt{position:absolute;font-size:14px;color:#0f0;animation:fly .8s ease-out forwards;pointer-events:none}
@keyframes fly{to{opacity:0;transform:translateY(-80px)}}
footer{display:flex;background:#0d1025;border-top:1px solid #0ff3;flex-shrink:0}
footer .ft{flex:1;text-align:center;padding:10px 4px;font-size:11px;cursor:pointer;color:#555;transition:.15s;-webkit-tap-highlight-color:transparent}
footer .ft.on{color:#0ff;text-shadow:0 0 5px #0ff}
footer .ft:active{background:rgba(0,255,255,.1)}
#panel{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a1a;z-index:50;display:none;flex-direction:column}
#panel.open{display:flex}
#panel-head{display:flex;align-items:center;padding:10px;border-bottom:1px solid #0ff3;background:#0d1025}
#panel-head h2{flex:1;font-size:14px;letter-spacing:2px;text-shadow:0 0 8px #0ff}
#close-panel{background:none;border:1px solid #0ff5;color:#0ff;padding:6px 12px;border-radius:4px;font-size:11px;cursor:pointer}
.tabs{display:flex;border-bottom:1px solid #0ff2;background:#0d1025;overflow-x:auto;flex-shrink:0}
.tab{min-width:70px;text-align:center;padding:10px 8px;font-size:12px;cursor:pointer;color:#666;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.tab.on{color:#0ff;border-color:#0ff}
.tab:active{background:rgba(0,255,255,.1)}
#pc{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#0ff3;border-radius:2px}
.sec{font-size:10px;color:#0ff;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;margin-top:4px}
.up{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.15);border-radius:8px;padding:12px;margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.up:active{background:rgba(0,255,255,.15)}
.up .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.up .nm{color:#0ff;font-weight:bold;font-size:13px}
.up .lv{color:#ffd700;font-size:11px}
.up .d{color:#888;font-size:11px;margin-bottom:4px}
.up .c{color:#ffd700;font-size:12px}
.up .c.ok{color:#0f0}
.up.m{opacity:.3;cursor:default}
.boss{background:linear-gradient(135deg,rgba(255,0,68,.08),rgba(255,100,0,.08));border:1px solid #f045;border-radius:8px;padding:12px;margin-bottom:8px}
.boss .bn{color:#f04;font-weight:bold;font-size:14px;margin-bottom:4px}
.boss .hp-bar{background:#1a1a2e;border-radius:3px;height:8px;margin:4px 0;overflow:hidden}
.boss .hp-f{height:100%;background:linear-gradient(90deg,#f04,#ff4400);border-radius:3px;transition:.2s}
.boss .st{display:flex;justify-content:space-between;font-size:10px;color:#888}
.boss .rw{color:#ffd700;font-size:11px;margin-top:4px}
.boss .btn-atk{width:100%;padding:10px;margin-top:6px;background:linear-gradient(135deg,#f04,#ff4400);border:none;border-radius:4px;color:#fff;font-weight:bold;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.boss .btn-atk:active{transform:scale(.97)}
.ach{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(0,255,255,.03);border:1px solid rgba(0,255,255,.08);border-radius:4px;margin-bottom:4px}
.ach.do{border-color:#ffd700;background:rgba(255,215,0,.05)}
.ach .ic{font-size:20px}
.ach .inf{flex:1}
.ach .an{font-size:12px;color:#0ff}
.ach .ad{font-size:10px;color:#888}
.ach .ar{color:#ffd700;font-size:10px}
.shop-item{background:linear-gradient(135deg,rgba(0,255,255,.05),rgba(170,0,255,.05));border:1px solid #0ff3;border-radius:8px;padding:12px;margin-bottom:8px;text-align:center}
.shop-item .si{font-size:28px;margin-bottom:4px}
.shop-item .sn{color:#0ff;font-weight:bold;font-size:14px}
.shop-item .sd{color:#888;font-size:12px;margin:4px 0}
.shop-item .sp{color:#ffd700;font-size:16px;font-weight:bold}
.shop-item button{margin-top:6px;background:linear-gradient(135deg,#0ff,#4af);border:none;color:#000;padding:8px 20px;border-radius:4px;font-size:12px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent}
.shop-item button:active{transform:scale(.95)}
.stat-row{display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid rgba(0,255,255,.05);font-size:12px}
.stat-row .sl{color:#888}
.stat-row .sv{color:#0ff;font-weight:bold}
.danger{background:#f043;border:1px solid #f045;color:#f04;padding:8px;border-radius:4px;font-size:11px;cursor:pointer;margin-top:8px;width:100%;-webkit-tap-highlight-color:transparent}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.show{display:flex}
.overlay-box{background:#0d1025;border:1px solid #0ff;border-radius:12px;padding:20px;max-width:340px;width:100%;text-align:center}
.overlay-box h3{color:#0ff;font-size:16px;margin-bottom:10px}
.overlay-box p{color:#888;font-size:13px;margin-bottom:15px;line-height:1.5}
.overlay-box button{background:#0ff;border:none;color:#000;padding:8px 20px;border-radius:4px;font-size:12px;font-weight:bold;cursor:pointer;margin:4px;-webkit-tap-highlight-color:transparent}
.overlay-box button:active{transform:scale(.95)}
@media(max-width:480px){
  header h1{font-size:14px;letter-spacing:2px}
  header{padding:6px}
  .res-bar{font-size:10px;padding:4px}
  #tap-btn{width:130px;height:130px}
  #tap-btn .big{font-size:32px}
  .r{flex-direction:column;gap:1px;font-size:9px}
  .tab{min-width:60px;padding:8px 6px;font-size:11px}
  .up{padding:8px}
  .up .nm{font-size:12px}
}
@media(min-width:800px){
  #tap-btn{width:180px;height:180px}
  #tap-btn .big{font-size:44px}
}
</style>
</head>
<body>

<header><h1>⚡ CYBER REALM ⚡</h1></header>

<div class="res-bar">
  <span class="r">💎 <span class="v" id="rc">0</span><span class="rate" id="rcR"></span></span>
  <span class="r">⚡ <span class="v" id="rn">0</span></span>
  <span class="r">🧬 <span class="v" id="rd">0</span></span>
  <span class="r">🌀 <span class="v" id="re">0</span></span>
  <span class="r">💎 <span class="v" id="rg">0</span><span class="rate" style="color:#a0f">prem</span></span>
</div>

<div id="area">
  <div id="tap-zone">
    <div id="parts"></div>
    <button id="tap-btn"><div><span class="big">⚡</span>TAP</div></button>
    <div id="tap-info"></div>
    <div id="cps">per sec: 0 | taps: 0</div>
    <div id="prog"><div id="prog-bg"><div id="prog-fill"></div></div><div id="prog-t">Realm Lv.1 — Digital Nexus</div></div>
  </div>
</div>

<footer>
  <div class="ft on" data-v="game">🎮</div>
  <div class="ft" data-v="up">⬆️</div>
  <div class="ft" data-v="bo">👹</div>
  <div class="ft" data-v="sh">🛒</div>
  <div class="ft" data-v="st">📊</div>
</footer>

<div id="panel">
  <div id="panel-head"><h2 id="panT">⬆️ Upgrades</h2><button id="cPan">✕</button></div>
  <div class="tabs" id="panTabs">
    <div class="tab on" data-t="up">⬆️</div>
    <div class="tab" data-t="bo">👹</div>
    <div class="tab" data-t="ac">🏆</div>
    <div class="tab" data-t="qu">📜</div>
    <div class="tab" data-t="sh">🛒</div>
  </div>
  <div id="pc"></div>
</div>

<div class="overlay" id="ov">
  <div class="overlay-box"><h3 id="ovT"></h3><p id="ovP"></p><div id="ovB"></div></div>
</div>

<script>
(function(){
"use strict";

var S={c:0,ct:0,n:0,d:0,e:0,g:0,cl:0,bs:0,pr:0,pp:0,cp:1,ps:0,ns:0,ds:0,es:0,gm:1,dm:1,rl:1,rp:0,rg:100,up:{},ac:[],cb:null,bh:0,lastSave:Date.now()};
var RN=["Digital Nexus","Neon Grid","Quantum Core","Cyber Hive","Dark Matrix","Void Sector","Inf Loop","Omega Realm","Alpha Sing","Cyber Eden","Neural Net","Phantom Zone","Binary Storm","Chrome Void","Data Ocean","Void Core"];
var UPG=[{n:"Neural Link",d:"+1 tap",cb:10,fn:function(){S.cp+=1},mx:100},{n:"Laser Focus",d:"+5 tap",cb:100,fn:function(){S.cp+=5},mx:50},{n:"Plasma Core",d:"+25 tap",cb:1000,fn:function(){S.cp+=25},mx:30},{n:"Nano Bot",d:"0.5/s",cb:50,fn:function(){S.ps+=0.5},mx:50},{n:"Drone Swarm",d:"2/s",cb:200,fn:function(){S.ps+=2},mx:30},{n:"AI Core",d:"10/s",cb:1000,fn:function(){S.ps+=10},mx:20},{n:"Quantum Farm",d:"50/s",cb:5000,fn:function(){S.ps+=50},mx:15},{n:"Compressor",d:"x1.5",cb:250,fn:function(){S.gm*=1.5},mx:5},{n:"Entropy Eng",d:"x2",cb:2500,fn:function(){S.gm*=2},mx:3},{n:"Solar",d:"+1 ⚡/t",cb:30,fn:function(){S.ns+=1},mx:20},{n:"Data Miner",d:"+1 🧬/t",cb:25,fn:function(){S.ds+=1},mx:20},{n:"Encryptor",d:"x2 data",cb:300,fn:function(){S.dm*=2},mx:5},{n:"Chaos Inj",d:"+1 🌀/t",cb:500,fn:function(){S.es+=1},mx:10}];
var BS=[{n:"Glitch",hp:100,cr:50,ic:"👻"},{n:"Golem",hp:500,cr:200,ic:"🗿"},{n:"Swarm",hp:2000,cr:800,ic:"🦠"},{n:"Kraken",hp:8000,cr:3000,ic:"🐙"},{n:"Dragon",hp:30000,cr:12000,ic:"🐉"},{n:"Overlord",hp:100000,cr:50000,ic:"🧠"},{n:"Emperor",hp:500000,cr:200000,ic:"👑"},{n:"Omega",hp:2000000,cr:1000000,icon:"🌀"}];
var ACHS=[{id:"a1",n:"First Tap",d:"Tap once",i:"👆",ck:function(){return S.cl>=1}},{id:"a2",n:"Clicker",d:"Tap 100",i:"🖱️",ck:function(){return S.cl>=100}},{id:"a3",n:"Rich",d:"Earn 10K",i:"💰",ck:function(){return S.ct>=10000}},{id:"a4",n:"Boss",d:"Defeat 1 boss",i:"⚔️",ck:function(){return S.bs>=1}},{id:"a5",n:"Hunter",d:"Defeat 10",i:"🏆",ck:function(){return S.bs>=10}},{id:"a6",n:"Walker",d:"Realm Lv.10",i:"🌌",ck:function(){return S.rl>=10}},{id:"a7",n:"Prestige",d:"Prestige once",i:"🌟",ck:function(){return S.pr>=1}},{id:"a8",n:"Speed",d:"100/s",i:"🚀",ck:function(){return getCPS()>=100}}];

function getCPS(){return S.ps*S.gm;}
function fmt(n){if(n>=1e12)return(n/1e12).toFixed(1)+"T";if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e4)return(n/1e3).toFixed(1)+"K";return Math.floor(n);}
function $(id){return document.getElementById(id);}
function showP(show){$("panel").classList.toggle("open",show);}
function dlg(t,p,bs){$("ovT").textContent=t;$("ovP").textContent=p;$("ovB").innerHTML="";for(var i=0;i<bs.length;i++){var b=document.createElement("button");b.textContent=bs[i].t;b.onclick=bs[i].f;$("ovB").appendChild(b);}$("ov").classList.add("show");}
function cdlg(){$("ov").classList.remove("show");}

// ═══ CORE TAP FUNCTION ═══
function doTap(){
  var v=Math.floor(S.cp*S.gm);
  S.c+=v;S.ct+=v;S.cl++;S.rp+=v;S.n+=S.ns;S.d+=S.ds*S.dm;S.e+=S.es;
  $("tap-info").textContent="+"+fmt(v)+" 💎";
  if(S.cb&&S.bh>0){S.bh-=v;if(S.bh<=0)winBoss();}
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;upLvl(S.rl);}
  if(!S.cb&&S.rl>=5&&Math.random()<0.01)sumBoss();
  chkAch();fly("+"+fmt(v));draw();
}

// ═══ BIND TAP BUTTON — mobile first ═══
var tapBtn=$("tap-btn");
tapBtn.addEventListener("touchstart",function(e){e.preventDefault();doTap();},{passive:false});
tapBtn.addEventListener("mousedown",function(e){e.preventDefault();doTap();});

function sumBoss(){var i=Math.min(Math.floor(S.rl/5),BS.length-1);S.cb=BS[i];S.bh=S.cb.hp;}
function winBoss(){S.c+=S.cb.cr;S.bs++;fly("+"+fmt(S.cb.cr)+" 💎");S.cb=null;S.bh=0;chkAch();}
function upLvl(lv){dlg("🌀 REALM UP!","Level "+lv+" — "+RN[Math.min(lv-1,RN.length-1)],[{t:"OK",f:function(){cdlg();}}]);}
function chkAch(){for(var i=0;i<ACHS.length;i++){var a=ACHS[i];if(S.ac.indexOf(a.id)<0&&a.ck()){S.ac.push(a.id);S.g+=10;}}}

// ═══ DRAW ═══
function draw(){
  $("rc").textContent=fmt(S.c);$("rn").textContent=fmt(S.n);
  $("rd").textContent=fmt(S.d);$("re").textContent=fmt(S.e);$("rg").textContent=fmt(S.g);
  $("rcR").textContent=getCPS()>0?"+"+fmt(getCPS())+"/s":"";
  $("cps").textContent="per sec: "+fmt(getCPS)+" | taps: "+fmt(S.cl);
  $("prog-fill").style.width=Math.min(100,(S.rp/S.rg)*100)+"%";
  $("prog-t").textContent="Realm Lv."+S.rl+" — "+RN[Math.min(S.rl-1,RN.length-1)];
}
function fly(t){var p=document.createElement("div");p.className="pt";p.textContent=t;p.style.left=(30+Math.random()*40)+"%";p.style.top="40%";$("parts").appendChild(p);setTimeout(function(){p.remove();},800);}

// ═══ PANEL ═══
var curTab="up";
$("cPan").addEventListener("click",function(){showP(false);});
$("cPan").addEventListener("touchstart",function(e){e.preventDefault();showP(false);},{passive:false});

$("panTabs").addEventListener("click",function(e){var t=e.target.closest(".tab");if(!t)return;$("panTabs").querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});t.classList.add("on");curTab=t.dataset.t;renderP();},{passive:false});
$("panTabs").addEventListener("touchstart",function(){},{passive:false});

// Footer
document.querySelectorAll(".ft").forEach(function(ft){
  ft.addEventListener("click",function(){onFoot(this.dataset.v);});
  ft.addEventListener("touchstart",function(){},{passive:false});
});

function onFoot(v){
  document.querySelectorAll(".ft").forEach(function(x){x.classList.remove("on");});
  document.querySelector("[data-v="+v+"]").classList.add("on");
  if(v==="game"){showP(false);draw();}
  else if(v==="up"){showP(true);$("panT").textContent="⬆️ Upgrades";$("panTabs").style.display="";curTab="up";$("panTabs").querySelectorAll(".tab").forEach(function(t){t.classList.toggle("on",t.dataset.t==="up");});renderP();}
  else if(v==="bo"){showP(true);$("panT").textContent="👹 Boss";$("panTabs").style.display="";curTab="bo";$("panTabs").querySelectorAll(".tab").forEach(function(t){t.classList.toggle("on",t.dataset.t==="bo");});renderP();}
  else if(v==="sh"){showP(true);$("panT").textContent="🛒 Shop";$("panTabs").style.display="none";renderShop();}
  else if(v==="st"){showP(true);$("panT").textContent="📊 Stats";$("panTabs").style.display="none";renderStats();}
}

function renderP(){
  var p=$("pc");p.innerHTML="";
  if(curTab==="up")renderUp(p);
  else if(curTab==="bo")renderBoss(p);
  else if(curTab==="ac")renderAch(p);
  else if(curTab==="qu")renderQuest(p);
  else if(curTab==="sh")renderShop();
}

function renderUp(pc){
  var h='<div class="sec">⬆️ Upgrades</div>';
  for(var i=0;i<UPG.length;i++){
    var u=UPG[i];var o=S.up[i]||0;var mx=o>=u.mx;
    var cost=Math.floor(u.cb*Math.pow(1.15,o));var ok=S.c>=cost&&!mx;
    h+='<div class="up'+(mx?' m':'')+'" data-i="'+i+'"><div class="h"><span class="nm">'+u.n+'</span><span class="lv">'+o+'/'+u.mx+'</span></div><div class="d">'+u.d+'</div><div class="c'+(ok?' ok':'')+'">'+(mx?'MAX':fmt(cost)+' 💎')+'</div></div>';
  }
  pc.innerHTML=h;
  pc.querySelectorAll(".up").forEach(function(el){
    var handler=function(){
      if(el.classList.contains("m"))return;
      var i=parseInt(el.dataset.i);var u=UPG[i];var o=S.up[i]||0;
      var cost=Math.floor(u.cb*Math.pow(1.15,o));if(S.c<cost)return;
      S.c-=cost;S.up[i]=o+1;u.fn();chkAch();renderP();draw();
    };
    el.addEventListener("click",handler);
    el.addEventListener("touchstart",function(){},{passive:false});
  });
}

function renderBoss(pc){
  if(!S.cb){
    pc.innerHTML='<div class="sec">👹 Bosses</div><p style="color:#666;font-size:12px;margin:8px 0">Reach Realm Lv.5+</p><button class="boss .btn-atk" id="sBtn">⚔️ Summon</button>';
    var sb=$("sBtn");sb.onclick=function(){sumBoss();renderP();};
    sb.addEventListener("touchstart",function(){},{passive:false});
  }else{
    var pct=Math.max(0,(S.bh/S.cb.hp)*100);
    pc.innerHTML='<div class="sec">👹 '+S.cb.ic+' '+S.cb.n+'</div><div class="hp-bar"><div class="hp-f" style="width:'+pct+'%"></div></div><div class="st"><span>HP:'+fmt(S.bh)+'/'+fmt(S.cb.hp)+'</span><span>'+pct.toFixed(0)+'%</span></div><div class="rw">Reward: '+fmt(S.cb.cr)+' 💎</div><button class="btn-atk" id="aBtn">⚔️ ATTACK</button>';
    var ab=$("aBtn");
    ab.onclick=function(){var v=Math.floor(S.cp*S.gm);S.bh-=v;S.rp+=v;S.c+=v;S.ct+=v;S.n+=S.ns;S.d+=S.ds*S.dm;S.e+=S.es;if(S.bh<=0)winBoss();while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;}renderP();draw();};
    ab.addEventListener("touchstart",function(){},{passive:false});
  }
}

function renderAch(pc){
  var h='<div class="sec">🏆 Achievements ('+S.ac.length+'/'+ACHS.length+')</div>';
  for(var i=0;i<ACHS.length;i++){var a=ACHS[i];var done=S.ac.indexOf(a.id)>=0;h+='<div class="ach'+(done?' do':'')+'"><span class="ic">'+(done?'✅':a.i)+'</span><div class="inf"><div class="an">'+a.n+'</div><div class="ad">'+a.d+'</div></div>'+(done?'<span class="ar">Done</span>':'<span class="ar">💎10</span>')+'</div>';}
  pc.innerHTML=h;
}

function renderQuest(pc){
  if(!S.quests||!S.quests.length){S.quests=[{id:"q1",n:"Tap 50",d:"Tap 50 times",ck:function(){return S.cl>=50},rw:5},{id:"q2",n:"Earn 5K",d:"Collect 5000 credits",ck:function(){return S.ct>=5000},rw:10},{id:"q3",n:"Kill 3 bosses",d:"Defeat 3 bosses",ck:function(){return S.bs>=3},rw:15}];}
  var h='<div class="sec">📜 Quests</div>';
  for(var i=0;i<S.quests.length;i++){var q=S.quests[i];var done=q.ck();h+='<div class="up"><div class="h"><span class="nm">'+q.n+'</span>'+(done?'<span class="lv">✅</span>':'')+'</div><div class="d">'+q.d+'</div>'+(done?'<button data-qid="'+q.id+'" style="margin-top:4px;width:100%;background:#a0f;border:none;color:#fff;padding:6px;border-radius:3px">Claim '+q.rw+' 💎</button>':'')+'</div>';}
  pc.innerHTML=h;
  pc.querySelectorAll("[data-qid]").forEach(function(b){
    var h=function(){var q=S.quests.find(function(x){return x.id===b.dataset.qid});if(!q||!q.ck())return;S.g+=q.rw;S.quests=S.quests.filter(function(x){return x.id!==q.id;});renderP();draw();};
    b.onclick=h;b.addEventListener("touchstart",function(){},{passive:false});
  });
}

function renderShop(){
  var p=$("pc");
  var items=[{n:"Starter",d:"100 Gems",p:"$0.99",g:100},{n:"Pro Pack",d:"500 Gems + x2/h",p:"$2.99",g:500},{n:"Mega Pack",d:"2000 Gems + x3/h",p:"$9.99",g:2000},{n:"VIP",d:"x1.5 forever + 1K Gems",p:"$19.99",g:1000}];
  var h='<div class="sec">🛒 Premium Shop</div>';
  for(var i=0;i<items.length;i++){var it=items[i];h+='<div class="shop-item"><div class="si">💎</div><div class="sn">'+it.n+'</div><div class="sd">'+it.d+'</div><div class="sp">'+it.p+'</div><button data-g="'+it.g+'">Buy</button></div>';}
  h+='<button style="width:100%;margin-top:10px;padding:10px;background:rgba(255,0,68,.2);border:1px solid #f045;color:#f04;border-radius:4px;cursor:pointer" id="dnBtn">❤️ Donate / Support</button>';
  p.innerHTML=h;
  p.querySelectorAll("[data-g]").forEach(function(b){
    var h=function(){dlg("Payment","Payment coming soon!\n+"+b.dataset.g+" gems (test).",[{t:"OK",f:function(){S.g+=parseInt(b.dataset.g);cdlg();draw();}}]);};
    b.onclick=h;b.addEventListener("touchstart",function(){},{passive:false});
  });
  var dn=$("dnBtn");dn.onclick=function(){dlg("Support","BTC: bc1q...\nETH: 0x...\n\nThanks! ❤️️",[{t:"Close",f:function(){cdlg();}}]);};
  dn.addEventListener("touchstart",function(){},{passive:false});
}

function renderStats(){
  var p=$("pc");
  var h='<div class="sec">📊 Stats</div>';
  [["Clicks",fmt(S.cl)],["Total Credits",fmt(S.ct)],["Tap Power",fmt(S.cp)],["Per Sec",fmt(getCPS())],["Realm",S.rl],["Bosses",S.bs],["Prestige",S.pr],["Points",S.pp.toFixed(1)],["Gems",S.g]].forEach(function(r){h+='<div class="stat-row"><span class="sl">'+r[0]+'</span><span class="sv">'+r[1]+'</span></div>';});
  h+='<button style="width:100%;margin-top:10px;padding:10px;background:rgba(255,215,0,.1);border:1px solid #ffd70055;color:#ffd700;border-radius:4px;cursor:pointer" id="prBtn">🌟 Prestige ('+Math.floor(Math.sqrt(S.ct/1e6)+S.rl*0.5)+' pts)</button>';
  h+='<button style="width:100%;margin-top:6px;padding:10px;background:rgba(0,255,255,.1);border:1px solid #0ff3;color:#0ff;border-radius:4px;cursor:pointer" id="exBtn">📤 Export</button>';
  h+='<button style="width:100%;margin-top:6px;padding:10px;background:rgba(0,255,255,.1);border:1px solid #0ff3;color:#0ff;border-radius:4px;cursor:pointer" id="imBtn">📥 Import</button>';
  h+='<button style="width:100%;margin-top:6px;padding:10px;background:rgba(255,0,68,.2);border:1px solid #f045;color:#f04;border-radius:4px;cursor:pointer" id="dlBtn">🗑️ Delete All</button>';
  p.innerHTML=h;
  var pr=$("prBtn");pr.onclick=function(){var pts=Math.floor(Math.sqrt(S.ct/1e6)+S.rl*0.5);if(pts<1)return;dlg("🌟 Prestige","Reset for "+pts+" pts?\nPermanent +"+Math.floor(pts*10)+"% tap bonus!",[{t:"Cancel",f:function(){cdlg();}},{t:"Prestige!",f:function(){doPres();}}]);};
  pr.addEventListener("touchstart",function(){},{passive:false});
  var ex=$("exBtn");ex.onclick=function(){prompt("Copy save:",btoa(JSON.stringify(S)));};
  ex.addEventListener("touchstart",function(){},{passive:false});
  var im=$("imBtn");im.onclick=function(){var d=prompt("Paste save:");if(!d)return;try{Object.assign(S,JSON.parse(atob(d)));save();showP(false);draw();}catch(e){alert("Invalid");}};
  im.addEventListener("touchstart",function(){},{passive:false});
  var dl=$("dlBtn");dl.onclick=function(){dlg("Delete ALL?","Cannot undo!",[{t:"Cancel",f:function(){cdlg();}},{t:"DELETE",f:function(){localStorage.removeItem("cri_save");location.reload();}}]);};
  dl.addEventListener("touchstart",function(){},{passive:false});
}

function doPres(){
  var pts=Math.floor(Math.sqrt(S.ct/1e6)+S.rl*0.5);
  if(pts<1){cdlg();return;}
  S.pr++;S.pp+=pts;S.c=0;S.ct=0;S.n=0;S.d=0;S.e=0;S.cl=0;
  S.cp=1+S.pp*0.1;S.ps=0;S.gm=1;S.dm=1;S.ns=0;S.ds=0;S.es=0;
  S.rl=1;S.rp=0;S.rg=100;S.up={};S.cb=null;S.bh=0;
  cdlg();showP(false);draw();
}

function save(){S.lastSave=Date.now();localStorage.setItem("cri_save",JSON.stringify(S));}
function load(){try{var d=localStorage.getItem("cri_save");if(d){Object.assign(S,JSON.parse(d));}}catch(e){}}

// Loop
setInterval(function(){
  if(getCPS()>0){var inc=getCPS()*0.3;S.c+=inc;S.ct+=inc;S.rp+=inc;}
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;}
  draw();
},300);
setInterval(function(){save();},15000);

load();draw();
})();
</script>
</body>
</html>
