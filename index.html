<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Cyber Realm Idle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#050510;color:#0ff;font-family:'Segoe UI',system-ui,sans-serif;height:100%;overflow:hidden;touch-action:manipulation}
body{display:flex;flex-direction:column;-webkit-user-select:none}
.scr{display:none;flex-direction:column;height:100%}
.scr.act{display:flex}
#login-scr{align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(0,255,255,.08),transparent 70%)}
#login-scr h1{font-size:2em;letter-spacing:4px;text-shadow:0 0 20px #0ff;margin-bottom:8px}
#login-scr .sub{color:#0f0;font-size:.9em;margin-bottom:20px}
.fld{width:100%;max-width:320px}
.fld input{width:100%;padding:14px;margin-bottom:10px;background:rgba(0,255,255,.05);border:1px solid #0ff3;border-radius:8px;color:#0ff;font-size:16px;outline:none}
.fld input:focus{border-color:#0ff;box-shadow:0 0 12px #0ff3}
.fld input::placeholder{color:#0ff5}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#0ff,#4af);border:none;border-radius:8px;color:#000;font-size:16px;font-weight:bold;cursor:pointer;margin-top:4px}
.btn:active{transform:scale(.96)}
.btn2{width:100%;padding:14px;background:transparent;border:1px solid #0ff5;color:#0ff;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:4px}
.msg{text-align:center;font-size:12px;margin-top:10px;min-height:16px}
.msg.ok{color:#0f0}.msg.err{color:#f04}
header{background:linear-gradient(180deg,#0a1628,#0d1025);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0ff4;flex-shrink:0}
header h1{font-size:14px;letter-spacing:3px;text-shadow:0 0 8px #0ff}
.uinfo{display:flex;align-items:center;gap:8px;font-size:11px}
.uinfo .nm{color:#ffd700;font-weight:bold}
.dot{width:8px;height:8px;border-radius:50%;background:#0f0;display:inline-block;margin-right:4px}
.lout{background:none;border:1px solid #f045;color:#f04;padding:3px 8px;border-radius:3px;font-size:10px;cursor:pointer}
.res{display:flex;justify-content:space-around;padding:5px;background:#0d1025;border-bottom:1px solid #0ff3;flex-shrink:0;font-size:11px;flex-wrap:wrap}
.r{display:flex;align-items:center;gap:3px}
.v{color:#ffd700;font-weight:bold}
.rt{color:#0f0;font-size:9px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#tapz{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}
#parts{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:10}
.pt{position:absolute;font-size:14px;font-weight:bold;animation:fly .8s ease-out forwards;pointer-events:none}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.5)}}
#tpbtn{width:160px;height:160px;border-radius:50%;border:3px solid #0ff;background:radial-gradient(circle at 35% 35%,rgba(0,255,255,.2),#0a0a2a 70%);color:#0ff;font-size:14px;cursor:pointer;box-shadow:0 0 30px rgba(0,255,255,.3),inset 0 0 20px rgba(0,255,255,.1);font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;position:relative;overflow:visible}
#tpbtn .in{text-align:center}
#tpbtn .bg{font-size:38px;display:block;line-height:1}
#tpbtn .tx{font-size:14px;letter-spacing:2px}
#tpbtn.active{transform:scale(.88);box-shadow:0 0 60px rgba(0,255,255,.7)}
#tpbtn.active .bg{transform:scale(1.15)}
#tpinfo{font-size:13px;color:#0f0;margin:6px 0;min-height:18px;text-align:center}
#tcps{font-size:10px;color:#666;text-align:center}
#prog{width:200px;margin:8px auto}
#prog-bg{background:#1a1a2e;border-radius:4px;height:6px;overflow:hidden}
#prog-fi{height:100%;background:linear-gradient(90deg,#0ff,#0f0);border-radius:4px;width:0%;transition:.3s}
#prog-t{text-align:center;font-size:10px;color:#666;margin-top:3px}
footer{display:flex;background:#0d1025;border-top:1px solid #0ff3;flex-shrink:0}
footer .tab{flex:1;text-align:center;padding:10px 4px;font-size:11px;cursor:pointer;color:#555;transition:.15s;-webkit-tap-highlight-color:transparent}
footer .tab.on{color:#0ff;text-shadow:0 0 5px #0ff}
footer .tab:active{background:rgba(0,255,255,.1)}
#panel{position:fixed;top:0;left:0;width:100%;height:100%;background:#050510;z-index:50;display:none;flex-direction:column}
#panel.act{display:flex}
#ph{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid #0ff3;background:#0d1025;min-height:40px}
#ph h2{flex:1;font-size:13px;letter-spacing:2px;text-shadow:0 0 8px #0ff}
#ph button{background:none;border:1px solid #0ff5;color:#0ff;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer}
.ptabs{display:flex;border-bottom:1px solid #0ff2;background:#0d1025;overflow-x:auto;flex-shrink:0}
.ptab{min-width:70px;text-align:center;padding:10px 8px;font-size:12px;cursor:pointer;color:#666;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.ptab.on{color:#0ff;border-color:#0ff}
#pc{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#0ff3;border-radius:2px}
.sec{font-size:10px;color:#0ff;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;margin-top:4px}
.up{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.15);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer}
.up:active{background:rgba(0,255,255,.12)}
.up .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.up .nm{color:#0ff;font-weight:bold;font-size:13px}
.up .lv{color:#ffd700;font-size:11px}
.up .d{color:#777;font-size:11px;margin-bottom:3px}
.up .c{color:#ffd700;font-size:12px}
.up .c.ok{color:#0f0}
.up.m{opacity:.3;cursor:default}
.boss{background:linear-gradient(135deg,rgba(255,0,68,.08),rgba(255,100,0,.06));border:1px solid #f045;border-radius:8px;padding:10px;margin-bottom:6px}
.boss .bn{color:#f04;font-weight:bold;font-size:13px;margin-bottom:3px}
.boss .hp{background:#1a1a2e;border-radius:3px;height:6px;margin:3px 0;overflow:hidden}
.boss .hp-f{height:100%;background:linear-gradient(90deg,#f04,#ff4400);border-radius:3px;transition:.2s}
.boss .st{display:flex;justify-content:space-between;font-size:9px;color:#777}
.boss .rw{color:#ffd700;font-size:10px;margin-top:3px}
.atk-btn{width:100%;padding:10px;margin-top:6px;background:linear-gradient(135deg,#f04,#ff4400);border:none;border-radius:4px;color:#fff;font-weight:bold;font-size:13px;cursor:pointer}
.atk-btn:active{transform:scale(.97)}
.ach{display:flex;align-items:center;gap:6px;padding:6px;background:rgba(0,255,255,.03);border:1px solid rgba(0,255,255,.08);border-radius:4px;margin-bottom:3px}
.ach.do{border-color:#ffd700;background:rgba(255,215,0,.05)}
.ach .ic{font-size:18px}
.ach .inf{flex:1}
.ach .an{font-size:11px;color:#0ff}
.ach .ad{font-size:9px;color:#777}
.ach .ar{color:#ffd700;font-size:9px}
.strow{display:flex;justify-content:space-between;padding:6px 3px;border-bottom:1px solid rgba(0,255,255,.05);font-size:11px}
.strow .sl{color:#777}
.strow .sv{color:#0ff;font-weight:bold}
.shop{background:linear-gradient(135deg,rgba(0,255,255,.05),rgba(170,0,255,.05));border:1px solid #0ff3;border-radius:8px;padding:10px;margin-bottom:6px;text-align:center}
.shop .si{font-size:24px;margin-bottom:3px}
.shop .sn{color:#0ff;font-weight:bold;font-size:13px}
.shop .sd{color:#777;font-size:11px;margin:3px 0}
.shop .sp{color:#ffd700;font-size:14px;font-weight:bold}
.shop button{margin-top:4px;background:linear-gradient(135deg,#0ff,#4af);border:none;color:#000;padding:6px 16px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer}
.danger{background:#f043;border:1px solid #f045;color:#f04;padding:6px;border-radius:4px;font-size:11px;cursor:pointer;margin-top:6px;width:100%}
#chtabs{display:flex;border-bottom:1px solid #0ff2;flex-shrink:0}
.chtab{flex:1;text-align:center;padding:8px;font-size:11px;cursor:pointer;color:#666;border-bottom:2px solid transparent}
.chtab.on{color:#0ff;border-color:#0ff}
#chmsgs{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.chmsg{margin-bottom:6px;padding:8px;background:rgba(0,255,255,.03);border-radius:6px;border-left:2px solid #0ff}
.chmsg .auth{color:#ffd700;font-weight:bold;font-size:10px}
.chmsg .txt{color:#ccc;font-size:12px;margin-top:2px;word-break:break-word;white-space:pre-wrap}
.chmsg .time{color:#555;font-size:9px;margin-top:2px;text-align:right}
.chmsg.me{border-left-color:#ffd700;background:rgba(255,215,0,.05)}
#chowli{font-size:10px;color:#a0f;text-align:center;padding:4px;display:none;background:rgba(170,0,255,.05)}
#chinp{display:flex;padding:8px;border-top:1px solid #0ff2;gap:6px;flex-shrink:0}
#chinp input{flex:1;padding:10px;background:rgba(0,255,255,.05);border:1px solid #0ff3;border-radius:4px;color:#0ff;font-size:13px;outline:none}
#chinp input:focus{border-color:#0ff}
#chinp button{padding:10px 14px;background:#0ff;border:none;border-radius:4px;color:#000;font-weight:bold;font-size:12px;cursor:pointer}
#bfight{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,16,.95);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#bfight.act{display:flex}
#bfs{font-size:64px;animation:bbounce 1s ease-in-out infinite}
@keyframes bbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#bfn{color:#f04;font-size:18px;font-weight:bold;text-shadow:0 0 12px #f04;margin:10px 0}
.fdmg{position:absolute;font-size:20px;font-weight:bold;color:#f04;animation:fd .8s ease-out forwards;pointer-events:none;z-index:201}
@keyframes fd{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.act{display:flex}
.overlay-box{background:#0d1025;border:1px solid #0ff;border-radius:12px;padding:15px;max-width:320px;width:100%;text-align:center}
.overlay-box h3{color:#0ff;font-size:14px;margin-bottom:8px}
.overlay-box p{color:#888;font-size:12px;margin-bottom:15px;line-height:1.5}
.overlay-box button{background:#0ff;border:none;color:#000;padding:6px 15px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;margin:3px}
@media(max-width:480px){
  header h1{font-size:12px;letter-spacing:2px}header{padding:6px 8px}
  .res{font-size:9px;padding:3px}.r{flex-direction:column;gap:0;font-size:8px}
  #tpbtn{width:140px;height:140px}#tpbtn .bg{font-size:32px}#tpbtn .tx{font-size:12px}
  footer .tab{padding:8px 2px;font-size:9px}
  .ptab{min-width:55px;padding:8px 5px;font-size:10px}
}
</style></head><body>

<div class="scr act" id="login-scr">
  <h1>⚡ CYBER REALM ⚡</h1>
  <div class="sub">Футуристическая Idle Игра v4.0</div>
  <div class="fld">
    <input type="text" id="au" placeholder="Имя пользователя" maxlength="20">
    <input type="password" id="ap" placeholder="Пароль" maxlength="30">
    <div class="msg" id="amsg"></div>
    <button class="btn" id="alogin">Войти</button>
    <button class="btn2" id="areg">Регистрация</button>
  </div>
</div>

<div class="scr" id="game-scr">
  <header><h1>⚡ CYBER REALM ⚡</h1><div class="uinfo"><span class="dot"></span><span class="nm" id="uname"></span><button class="lout" id="lout">Выйти</button></div></header>
  <div class="res">
    <span class="r">💎<span class="v" id="rc">0</span><span class="rt" id="rcR"></span></span>
    <span class="r">⚡<span class="v" id="rn">0</span></span>
    <span class="r">🧬<span class="v" id="rd">0</span></span>
    <span class="r">🌀<span class="v" id="re">0</span></span>
  </div>
  <div id="main">
    <div id="tapz">
      <div id="parts"></div>
      <button id="tpbtn"><div class="in"><span class="bg">⚡</span><span class="tx">НАЖМИ</span></div></button>
      <div id="tpinfo"></div>
      <div id="tcps">в сек: 0 | тапов: 0</div>
      <div id="prog"><div id="prog-bg"><div id="prog-fi"></div></div><div id="prog-t">Рейм ур.1 — Цифровой Нексус</div></div>
    </div>
  </div>
  <footer>
    <div class="tab on" data-scr="game"><div style="font-size:18px">🎮</div><div>Игра</div></div>
    <div class="tab" data-scr="up"><div style="font-size:18px">⬆️</div><div>Улучш.</div></div>
    <div class="tab" data-scr="bo"><div style="font-size:18px">👹</div><div>Боссы</div></div>
    <div class="tab" data-scr="chat"><div style="font-size:18px">💬</div><div>Чат</div></div>
    <div class="tab" data-scr="settings"><div style="font-size:18px">⚙️</div><div>Ещё</div></div>
  </footer>
</div>

<div id="panel">
  <div id="ph"><h2 id="ptitle">⬆️ Улучшения</h2><button id="pcan">✕</button></div>
  <div class="ptabs" id="ptabs">
    <div class="ptab on" data-tab="up">⬆️</div>
    <div class="ptab" data-tab="bo">👹</div>
    <div class="ptab" data-tab="ac">🏆</div>
    <div class="ptab" data-tab="qu">📜</div>
    <div class="ptab" data-tab="sh">🛒</div>
  </div>
  <div id="pc"></div>
</div>

<div class="scr" id="chat-scr">
  <header><h1>💬 Чат</h1><button class="lout" id="cback">✕</button></header>
  <div id="chtabs">
    <div class="chtab on" data-tab="g">🌍 Общий</div>
    <div class="chtab" data-tab="o">🦉 OWL</div>
  </div>
  <div id="chmsgs"></div>
  <div id="chowli">🦉 OWL думает...</div>
  <div id="chinp">
    <input type="text" id="chin" placeholder="Сообщение или задание для OWL..." maxlength="200">
    <button id="chsend">→</button>
  </div>
</div>

<div id="bfight">
  <div id="bfs">👹</div>
  <div id="bfn">Босс</div>
  <div style="width:200px;background:#1a1a2e;border-radius:3px;height:8px;overflow:hidden;margin:8px 0">
    <div id="bf-hp" style="width:100%;height:100%;background:linear-gradient(90deg,#f04,#ff4400);border-radius:3px;transition:.2s"></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:#888;width:200px"><span id="bftext">HP: 100/100</span></div>
  <button class="atk-btn" id="bfatk">⚔️ АТАКОВАТЬ</button>
</div>

<div class="overlay" id="ov">
  <div class="overlay-box">
    <h3 id="ovt"></h3>
    <p id="ovp"></p>
    <div id="ovb"></div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
