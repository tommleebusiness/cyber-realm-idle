<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#050510"><title>Cyber Realm Idle</title><style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#050510;color:#0ff;font-family:'Segoe UI',system-ui,sans-serif;height:100%;overflow:hidden}
body{display:flex;flex-direction:column;touch-action:manipulation;-webkit-user-select:none}

/* ═══ ЭКРАНЫ ═══ */
#login-scr,#game-scr,#chat-scr{display:none;flex-direction:column;height:100%}
#login-scr.act,#game-scr.act,#chat-scr.act{display:flex}

#login-scr{align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(0,255,255,.08),transparent 70%)}
#login-scr h1{font-size:2em;letter-spacing:4px;text-shadow:0 0 20px #0ff;margin-bottom:8px}
#login-scr .sub{color:#0f0;font-size:.9em;margin-bottom:20px}
.fld{width:100%;max-width:320px}
.fld input{width:100%;padding:14px;margin-bottom:10px;background:rgba(0,255,255,.05);border:1px solid #0ff3;border-radius:8px;color:#0ff;font-size:16px;outline:none;transition:.2s}
.fld input:focus{border-color:#0ff;box-shadow:0 0 12px #0ff3}
.fld input::placeholder{color:#0ff5}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#0ff,#4af);border:none;border-radius:8px;color:#000;font-size:16px;font-weight:bold;cursor:pointer;transition:.15s;margin-top:4px}
.btn:active{transform:scale(.96)}
.btn2{width:100%;padding:14px;background:transparent;border:1px solid #0ff5;color:#0ff;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:4px}
.msg{text-align:center;font-size:12px;margin-top:10px;min-height:18px}
.msg.ok{color:#0f0}.msg.err{color:#f04}

/* ═══ ИГРА ═══ */
header{background:linear-gradient(180deg,#0a1628,#0d1025);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0ff4;flex-shrink:0}
header h1{font-size:14px;letter-spacing:3px;text-shadow:0 0 8px #0ff}
.uinfo{display:flex;align-items:center;gap:8px;font-size:11px}
.uinfo .nm{color:#ffd700;font-weight:bold}
.dot{width:8px;height:8px;border-radius:50%;background:#0f0;display:inline-block;margin-right:4px}
.lout{background:none;border:1px solid #f045;color:#f04;padding:3px 8px;border-radius:3px;font-size:10px;cursor:pointer}
.res{display:flex;justify-content:space-around;padding:5px;background:#0d1025;border-bottom:1px solid #0ff3;flex-shrink:0;font-size:11px;flex-wrap:wrap}
.r{display:flex;align-items:center;gap:3px}
.v{color:#ffd700;font-weight:bold}
.rt{color:#0f0;font-size:9px}

#area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#tape{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}

#tpbtn{width:160px;height:160px;border-radius:50%;border:3px solid #0ff;
background:radial-gradient(circle at 35% 35%,rgba(0,255,255,.2),#0a0a2a 70%);
color:#0ff;font-size:14px;cursor:pointer;box-shadow:0 0 30px rgba(0,255,255,.3),inset 0 0 20px rgba(0,255,255,.1);
font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;overflow:visible;position:relative}
#tpbtn .in{text-align:center}
#tpbtn .bg{font-size:38px;display:block;line-height:1}
#tpbtn .tx{font-size:14px;letter-spacing:2px}
#tpbtn.active{transform:scale(.88);box-shadow:0 0 60px rgba(0,255,255,.7)}
#tpbtn.active .bg{transform:scale(1.15)}
.ripple{position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;border:2px solid rgba(0,255,255,.5);animation:rip .5s ease-out forwards;pointer-events:none}
@keyframes rip{to{width:200px;height:200px;margin-top:-100px;margin-left:-100px;opacity:0}}
#tpinfo{font-size:13px;color:#0f0;margin:6px 0;min-height:18px;text-align:center}
#tcps{font-size:10px;color:#666;text-align:center}
#prog{width:200px;margin:8px auto}
#prog-bg{background:#1a1a2e;border-radius:4px;height:6px;overflow:hidden}
#prog-fi{height:100%;background:linear-gradient(90deg,#0ff,#0f0);border-radius:4px;width:0%;transition:.3s}
#prog-t{text-align:center;font-size:10px;color:#666;margin-top:3px}

#pts{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:10}
.pt{position:absolute;font-size:14px;font-weight:bold;animation:fly .8s ease-out forwards;pointer-events:none;z-index:11}
.pt.big{font-size:20px;color:#ffd700;text-shadow:0 0 8px #ffd700}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(.5)}}

footer{display:flex;background:#0d1025;border-top:1px solid #0ff3;flex-shrink:0}
footer .tab{flex:1;text-align:center;padding:10px 4px;font-size:11px;cursor:pointer;color:#555;transition:.15s;-webkit-tap-highlight-color:transparent}
footer .tab.on{color:#0ff;text-shadow:0 0 5px #0ff}
footer .tab:active{background:rgba(0,255,255,.1)}

/* ═══ ПАНЕЛЬ ═══ */
#panel{position:fixed;top:0;left:0;width:100%;height:100%;background:#050510;z-index:50;display:none;flex-direction:column}
#panel.act{display:flex}
#ph{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid #0ff3;background:#0d1025;min-height:40px}
#ph h2{flex:1;font-size:13px;letter-spacing:2px;text-shadow:0 0 8px #0ff}
#ph button{background:none;border:1px solid #0ff5;color:#0ff;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer}
.ptabs{display:flex;border-bottom:1px solid #0ff2;background:#0d1025;overflow-x:auto;flex-shrink:0}
.ptab{min-width:70px;text-align:center;padding:10px 8px;font-size:12px;cursor:pointer;color:#666;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.ptab.on{color:#0ff;border-color:#0ff}
.ptab:active{background:rgba(0,255,255,.1)}
#pc{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#0ff3;border-radius:2px}

/* ═══ КОМПОНЕНТЫ ═══ */
.sec{font-size:10px;color:#0ff;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;margin-top:4px}
.up{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.15);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.up:active{background:rgba(0,255,255,.12)}
.up .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.up .nm{color:#0ff;font-weight:bold;font-size:13px}
.up .lv{color:#ffd700;font-size:11px}
.up .d{color:#777;font-size:11px;margin-bottom:3px}
.up .c{color:#ffd700;font-size:12px}
.up .c.ok{color:#0f0}
.up.m{opacity:.3;cursor:default}

.boss{background:linear-gradient(135deg,rgba(255,0,68,.08),rgba(255,100,0,.06));border:1px solid #f045;border-radius:8px;padding:10px;margin-bottom:6px}
.boss .bn{color:#f04;font-weight:bold;font-size:13px;margin-bottom:3px}
.boss .hp{background:#1a1a2e;border-radius:3px;height:6px;margin:3px 0;overflow:hidden}
.boss .hp-f{height:100%;background:linear-gradient(90deg,#f04,#ff4400);border-radius:3px;transition:.2s}
.boss .st{display:flex;justify-content:space-between;font-size:9px;color:#777}
.boss .rw{color:#ffd700;font-size:10px;margin-top:3px}
.atk-btn{width:100%;padding:10px;margin-top:6px;background:linear-gradient(135deg,#f04,#ff4400);border:none;border-radius:4px;color:#fff;font-weight:bold;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.atk-btn:active{transform:scale(.97)}

.ach{display:flex;align-items:center;gap:6px;padding:6px;background:rgba(0,255,255,.03);border:1px solid rgba(0,255,255,.08);border-radius:4px;margin-bottom:3px}
.ach.do{border-color:#ffd700;background:rgba(255,215,0,.05)}
.ach .ic{font-size:18px}
.ach .inf{flex:1}
.ach .an{font-size:11px;color:#0ff}
.ach .ad{font-size:9px;color:#777}
.ach .ar{color:#ffd700;font-size:9px}

.strow{display:flex;justify-content:space-between;padding:6px 3px;border-bottom:1px solid rgba(0,255,255,.05);font-size:11px}
.strow .sl{color:#777}
.strow .sv{color:#0ff;font-weight:bold}

.shop{background:linear-gradient(135deg,rgba(0,255,255,.05),rgba(170,0,255,.05));border:1px solid #0ff3;border-radius:8px;padding:10px;margin-bottom:6px;text-align:center}
.shop .si{font-size:24px;margin-bottom:3px}
.shop .sn{color:#0ff;font-weight:bold;font-size:13px}
.shop .sd{color:#777;font-size:11px;margin:3px 0}
.shop .sp{color:#ffd700;font-size:14px;font-weight:bold}
.shop button{margin-top:4px;background:linear-gradient(135deg,#0ff,#4af);border:none;color:#000;padding:6px 16px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent}
.shop button:active{transform:scale(.95)}

.danger{background:#f043;border:1px solid #f045;color:#f04;padding:6px;border-radius:4px;font-size:11px;cursor:pointer;margin-top:6px;width:100%;-webkit-tap-highlight-color:transparent}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.act{display:flex}
.overlay-box{background:#0d1025;border:1px solid #0ff;border-radius:12px;padding:15px;max-width:320px;width:100%;text-align:center}
.overlay-box h3{color:#0ff;font-size:14px;margin-bottom:8px}
.overlay-box p{color:#888;font-size:12px;margin-bottom:15px;line-height:1.5}
.overlay-box button{background:#0ff;border:none;color:#000;padding:6px 15px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;margin:3px;-webkit-tap-highlight-color:transparent}
.overlay-box button:active{transform:scale(.95)}

/* CHAT */
#chtabs{display:flex;border-bottom:1px solid #0ff2;flex-shrink:0}
.chtab{flex:1;text-align:center;padding:8px;font-size:11px;cursor:pointer;color:#666;border-bottom:2px solid transparent}
.chtab.on{color:#0ff;border-color:#0ff}
#chmsgs{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.chmsg{margin-bottom:6px;padding:8px;background:rgba(0,255,255,.03);border-radius:6px;border-left:2px solid #0ff}
.chmsg .auth{color:#ffd700;font-weight:bold;font-size:10px}
.chmsg .txt{color:#ccc;font-size:12px;margin-top:2px;word-break:break-word}
.chmsg .time{color:#555;font-size:9px;margin-top:2px;text-align:right}
.chmsg.me{border-left-color:#ffd700;background:rgba(255,215,0,.05)}
#chowli{font-size:10px;color:#a0f;text-align:center;padding:4px;display:none;background:rgba(170,0,255,.05)}
#chinp{display:flex;padding:8px;border-top:1px solid #0ff2;gap:6px;flex-shrink:0}
#chinp input{flex:1;padding:10px;background:rgba(0,255,255,.05);border:1px solid #0ff3;border-radius:4px;color:#0ff;font-size:13px;outline:none}
#chinp input:focus{border-color:#0ff}
#chinp button{padding:10px 14px;background:#0ff;border:none;border-radius:4px;color:#000;font-weight:bold;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#chinp button:active{transform:scale(.95)}

/* ═══ АНИМАЦИИ ═══ */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,255,255,.2)}50%{box-shadow:0 0 40px rgba(0,255,255,.4)}}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
@keyframes zoomIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
.pulse{animation:pulse 2s ease-in-out infinite}
.glow{animation:glow 2s ease-in-out infinite}
.float{animation:float 3s ease-in-out infinite}
.shake{animation:shake .3s ease-in-out}
.zoomIn{animation:zoomIn .3s ease-out}
.slideUp{animation:slideUp .3s ease-out}

.tap-ripple{position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;border:2px solid rgba(0,255,255,.5);animation:ripple .5s ease-out forwards;pointer-events:none}
@keyframes ripple{to{width:200px;height:200px;margin-top:-100px;margin-left:-100px;opacity:0}}

/* Boss fight */
#bfight{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,16,.95);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#bfight.act{display:flex}
#bfs{font-size:64px;animation:bbounce 1s ease-in-out infinite}
@keyframes bbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#bfn{color:#f04;font-size:18px;font-weight:bold;text-shadow:0 0 12px #f04;margin:10px 0}
.fdmg{position:absolute;font-size:20px;font-weight:bold;color:#f04;animation:fd .8s ease-out forwards;pointer-events:none;z-index:201}
@keyframes fd{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

@media(max-width:480px){
  header h1{font-size:12px;letter-spacing:2px}
  header{padding:6px 8px}
  .res{font-size:9px;padding:3px}
  .r{flex-direction:column;gap:0;font-size:8px}
  #tpbtn{width:140px;height:140px}
  #tpbtn .bg{font-size:32px}
  #tpbtn .tx{font-size:12px}
  .tab{padding:8px 2px;font-size:9px;min-width:44px}
  .ptab{min-width:55px;padding:8px 5px;font-size:10px}
  .up{padding:8px}
  .up .nm{font-size:12px}
}
@media(min-width:800px){
  #tpbtn{width:180px;height:180px}
  #tpbtn .bg{font-size:44px}
}
}
</style></head><body>

<div id="login-scr">
  <h1>⚡ CYBER REALM ⚡</h1>
  <div class="sub">Футуристическая Idle Игра v3.0</div>
  <div class="fld">
    <input type="text" id="au" placeholder="Имя пользователя" maxlength="20">
    <input type="password" id="ap" placeholder="Пароль" maxlength="30">
    <div class="msg" id="amsg"></div>

</div>

  <header><h1>⚡ CYBER REALM ⚡</h1><div class="uinfo"><span class="dot"></span><span class="nm" id="uname"></span><button class="lout" id="lout">Выйти</button></div></header>
  <div class="res">
    <span class="r">💎<span class="v" id="rc">0</span><span class="rt" id="rcR"></span></span>
    <span class="r">⚡<span class="v" id="rn">0</span></span>
    <span class="r">🧬<span class="v" id="rd">0</span></span>
    <span class="r">🌀<span class="v" id="re">0</span></span>
  </div>

  <footer>
    <div class="tab on" id="tgame"><div style="font-size:18px">🎮</div><div>Игра</div></div>

    <div class="tab" id="tbo"><div style="font-size:18px">👹</div><div>Боссы</div></div>
    <div class="tab" id="tch"><div style="font-size:18px">💬</div><div>Чат</div></div>
    <div class="tab" id="tst"><div style="font-size:18px">⚙️</div><div>Ещё</div></div>
  </footer>

<div id="panel"><div id="ph"><h2 id="ptitle">⬆️ Улучшения</h2><button id="pcan">✕</button></div><div id="ptabs"><div class="ptab on" data-t="up">⬆️</div><div class="ptab" data-t="bo">👹</div><div class="ptab" data-t="ac">🏆</div><div class="ptab" data-t="qu">📜</div><div class="ptab" data-t="sh">🛒</div></div><div id="pc"></div></div>

</div>

<div class="overlay" id="ov"><div class="overlay-box"><h3 id="ovt"></h3><p id="ovp"></p><div id="ovb"></div></div></div>

<script>
(function(){
"use strict";

// ═══ AUTH ═══
var curUser=null;
var users={};
try{users=JSON.parse(localStorage.getItem("cr_users")||"{}");}catch(e){}
function saveUsers(){localStorage.setItem("cr_users",JSON.stringify(users));}
function hsh(p){var h=0;for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}
function $(id){return document.getElementById(id);}

function showScr(id){$("login-scr").classList.remove("act");$("game-scr").classList.remove("act");$("chat-scr").classList.remove("act");$(id+"-scr").classList.add("act");}

function amsg(m,t){var e=$("amsg");e.textContent=m;e.className="msg "+(t||"");}

$("alogin").onclick=function(){
  var u=$("au").value.trim(),p=$("ap").value;
  if(!u||!p){amsg("Заполни все поля","err");return;}
  if(!users[u]){amsg("Пользователь не найден","err");return;}
  if(users[u].pass!==hsh(p)){amsg("Неверный пароль","err");return;}
  curUser=u;users[u].lastLogin=Date.now();saveUsers();
  loadGame();showScr("game");amsg("","");
};
$("areg").onclick=function(){
  var u=$("au").value.trim(),p=$("ap").value;
  if(!u||!p){amsg("Заполни все поля","err");return;}
  if(u.length<3){amsg("Минимум 3 символа","err");return;}
  if(p.length<4){amsg("Минимум 4 символа пароля","err");return;}
  if(users[u]){amsg("Имя занято","err");return;}
  users[u]={pass:hsh(p),created:Date.now(),lastLogin:Date.now()};saveUsers();
  curUser=u;initNewGame();showScr("game");amsg("Аккаунт создан!","ok");
};
$("lout").onclick=function(){saveGame();curUser=null;showScr("login");};
$("cback").onclick=function(){showScr("game");};

// ═══ GAME STATE ═══
var S={c:0,ct:0,n:0,d:0,e:0,g:0,cl:0,bs:0,pr:0,pp:0,cp:1,ps:0,ns:0,ds:0,es:0,gm:1,dm:1,rl:1,rp:0,rg:100,up:{},ac:[],cb:null,bh:0,lastSave:Date.now()};

var RN=["Цифровой Нексус","Неоновая Сетка","Квантовое Ядро","Кибер-Улей","Тёмная Матрица","Пустотный Сектор","Бесконечный Цикл","Омега-Царство","Альфа-Сингулярность","Кибер-Эдем","Нейросеть","Фантомная Зона","Бинарный Шторм","Хромовая Пустота","Океан Данных","Пустотное Ядро","Мультивселенная","Тёмная Энергия","Сингулярность"];

var UPG=[
  {n:"Нейро-Связь",d:"➕1 тап",cb:10,fn:function(){S.cp+=1},mx:100},
  {n:"Лазерный Фокус",d:"➕5 тапов",cb:100,fn:function(){S.cp+=5},mx:50},
  {n:"Плазменное Ядро",d:"➕25 тапов",cb:1000,fn:function(){S.cp+=25},mx:30},
  {n:"Нано-Бот",d:"+0.5/с",cb:50,fn:function(){S.ps+=0.5},mx:50},
  {n:"Рой Дронов",d:"+2/с",cb:200,fn:function(){S.ps+=2},mx:30},
  {n:"ИИ-Ядро",d:"+10/с",cb:1000,fn:function(){S.ps+=10},mx:20},
  {n:"Квантовая Ферма",d:"+50/с",cb:5000,fn:function(){S.ps+=50},mx:15},

var tpBtn=$("tpbtn");
function doTap(){
  var v=Math.floor(S.cp*S.gm);
  S.c+=v;S.ct+=v;S.cl++;S.rp+=v;S.n+=S.ns;S.d+=S.ds*S.dm;S.e+=S.es;
  $("tpinfo").textContent="+"+fmt(v)+" 💎";
  tpBtn.classList.add("active");setTimeout(function(){tpBtn.classList.remove("active");},120);
  var rip=document.createElement("div");rip.className="ripple";tpBtn.appendChild(rip);setTimeout(function(){rip.remove();},600);
  if(S.cb&&S.bh>0){S.bh-=v;if(S.bh<=0)winBoss();}
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;lvlUp(S.rl);}
  if(!S.cb&&S.rl>=5&&Math.random()<0.01)spawnBoss();
  chkAch();fly("+ "+fmt(v));draw();
}

    r="🐛 Исправления внесены!\n\n• Кнопки на мобильных\n• Панель улучшений\n• Чат на русском\n• Сохранение при выходе";
  }else{
    var bonuses=[function(){var a=500+Math.floor(Math.random()*2000);S.c+=a;S.ct=a;return "💰 +"+fmt(a)+" кредитов";},function(){var a=10+Math.floor(Math.random()*90);S.g+=a;return "💎 +"+a+" гемов";},function(){S.cp+=3;return "⚡ +3 сила тапа";},function(){S.rl+=2;return "🌀 +2 уровня рейма";}];
    var bon=bonuses[Math.floor(Math.random()*bonuses.length)]();
    r="✅ Задано!\n\nБонус: "+bon+"\n\nТвоя идея добавлена в очередь разработки.";
  }

  // Mark task done
  for(var i=owlTasks.length-1;i>=0;i--){if(!owlTasks[i].done){owlTasks[i].done=true;break;}}
  saveTasks();
  addMsg("🦉 OWL",r,false);
  draw();
}

// ═══ NAV ═══
document.querySelectorAll("footer .tab").forEach(function(ft){
  ft.onclick=function(){
    document.querySelectorAll("footer .tab").forEach(function(x){x.classList.remove("on");});
    ft.classList.add("on");
    showScr("game");
    showPdis();
    var v=ft.id;
    if(v==="tup"){$("ptitle").textContent="⬆️ Улучшения";document.getElementById("ptabs").style.display="";curTab="up";document.getElementById("ptabs").querySelectorAll(".ptab").forEach(function(t){t.classList.toggle("on",t.dataset.t==="up");});showPact();renderP();}
    else if(v==="tbo"){$("ptitle").textContent="👹 Босс";document.getElementById("ptabs").style.display="";curTab="bo";document.getElementById("ptabs").querySelectorAll(".ptab").forEach(function(t){t.classList.toggle("on",t.dataset.t==="bo");});showPact();renderP();}
    else if(v==="tch"){showScr("chat");renderChat();}
    else if(v==="tst"){$("ptitle").textContent="⚙️ Ещё";document.getElementById("ptabs").style.display="none";showPact();renderSettings();}
    else if(v==="tgame"){showPdis();draw();}
  };
});

// ═══ SEND CHAT ═══
function sendChat(){
  var text=$("chin").value.trim();
  if(!text)return;$("chin").value="";
  addMsg(curUser,text,true);
  if(chatTab==="o"){
    owlTasks.push({text:text,from:curUser,time:Date.now(),done:false});
    saveTasks();
    $("chowli").style.display="block";
    setTimeout(function(){$("chowli").style.display="false";owlReply(text);},1500+Math.random()*2000);
  }
}

$("chsend").onclick=sendChat;
$("chin").addEventListener("keydown",function(e){if(e.key==="Enter")sendChat();});
$("chtabs").addEventListener("click",function(e){var t=e.target.closest(".chtab");if(!t)return;$("chtabs").querySelectorAll(".chtab").forEach(function(x){x.classList.remove("on");});t.classList.add("on");chatTab=t.dataset.ct;renderChat();});

// ═══ SAVE/LOAD ═══
function save(){
  if(!curUser)return;
  S.lastSave=Date.now();
  var saves={};try{saves=JSON.parse(localStorage.getItem("cr_saves")||"{}");}catch(e){}
  saves[curUser]=JSON.stringify(S);
  localStorage.setItem("cr_saves",JSON.stringify(saves));
  localStorage.setItem("cr_lastUser",curUser);
}
function loadGame(){
  if(!curUser)return;
  try{var saves=JSON.parse(localStorage.getItem("cr_saves")||"{}");var d=saves[curUser];if(d){var v=JSON.parse(d);for(var k in v)S[k]=v[k];}}catch(e){}
}
function initNewGame(){S={c:0,ct:0,n:0,d:0,e:0,g:0,cl:0,bs:0,pr:0,pp:0,cp:1,ps:0,ns:0,ds:0,es:0,gm:1,dm:1,rl:1,rp:0,rg:100,up:{},ac:[],cb:null,bh:0,lastSave:Date.now()};}

// ═══ AUTO SAVE ON EXIT ═══
window.addEventListener("beforeunload",function(){save();});
window.addEventListener("visibilitychange",function(){if(document.hidden)save();});

// ═══ LOOP ═══
setInterval(function(){
  if(getCPS()>0){var inc=getCPS()*0.3;S.c+=inc;S.ct+=inc;S.rp+=inc;}
  while(S.rp>=S.rg){S.rp-=S.rg;S.rl++;S.rg=Math.floor(S.rg*1.4);S.cp+=Math.ceil(S.rl*0.5);S.ps+=S.rl*0.3;}
  draw();
},300);
setInterval(function(){save();},10000);

// ═══ INIT ═══
var lastUser=localStorage.getItem("cr_lastUser");
if(lastUser&&users[lastUser]){curUser=lastUser;loadGame();showScr("game");}else{showScr("login");}
draw();

})();
</script>
