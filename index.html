<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cyber Realm Idle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#050510;color:#0ff;font-family:'Segoe UI',system-ui,sans-serif;height:100%;overflow:hidden;touch-action:manipulation;user-select:none}
#login-scr{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(0,255,255,.08),transparent 70%)}
#login-scr h1{font-size:2em;letter-spacing:4px;text-shadow:0 0 20px #0ff;margin-bottom:8px}
#login-scr .sub{color:#0f0;font-size:.9em;margin-bottom:20px}
.fld{width:100%;max-width:320px}
.fld input{width:100%;padding:14px;margin-bottom:10px;background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.2);border-radius:8px;color:#0ff;font-size:16px;outline:none}
.fld input:focus{border-color:#0ff;box-shadow:0 0 12px rgba(0,255,255,.2)}
.fld input::placeholder{color:rgba(0,255,255,.3)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#0ff,#4af);border:none;border-radius:8px;color:#000;font-size:16px;font-weight:bold;cursor:pointer;margin-top:4px}
.btn:active{transform:scale(.96)}
.btn2{width:100%;padding:14px;background:transparent;border:1px solid rgba(0,255,255,.3);color:#0ff;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:4px}
.msg{text-align:center;font-size:12px;margin-top:10px;min-height:16px}
.msg.ok{color:#0f0}.msg.err{color:#f44}
#game-scr{display:none;flex-direction:column;height:100%}
header{background:linear-gradient(180deg,#0a1628,#0d1025);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid rgba(0,255,255,.25);flex-shrink:0}
header h1{font-size:14px;letter-spacing:3px;text-shadow:0 0 8px #0ff}
.uinfo{display:flex;align-items:center;gap:8px;font-size:11px}
.uinfo .nm{color:#ffd700;font-weight:bold}
.dot{width:8px;height:8px;border-radius:50%;background:#0f0;display:inline-block;margin-right:4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.lout{background:none;border:1px solid rgba(255,0,68,.3);color:#f44;padding:3px 8px;border-radius:3px;font-size:10px;cursor:pointer}
.res{display:flex;justify-content:space-around;padding:5px;background:#0d1025;border-bottom:1px solid rgba(0,255,255,.1);flex-shrink:0;font-size:11px}
.r{display:flex;align-items:center;gap:3px}
.v{color:#ffd700;font-weight:bold}
.rt{color:#0f0;font-size:9px}
#area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#tapz{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}
#parts{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:10}
.pt{position:absolute;font-size:14px;font-weight:bold;animation:fly .8s ease-out forwards;pointer-events:none}
@keyframes fly{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
#tpbtn{width:160px;height:160px;border-radius:50%;border:3px solid #0ff;background:radial-gradient(circle at 35% 35%,rgba(0,255,255,.2),#0a0a2a 70%);color:#0ff;font-size:14px;cursor:pointer;box-shadow:0 0 30px rgba(0,255,255,.3),inset 0 0 20px rgba(0,255,255,.1);font-family:inherit;touch-action:manipulation;position:relative}
#tpbtn .in{text-align:center}
#tpbtn .bg{font-size:38px;display:block;line-height:1}
#tpbtn .tx{font-size:14px;letter-spacing:2px}
#tpbtn:active{transform:scale(.9);box-shadow:0 0 60px rgba(0,255,255,.5)}
#tpinfo{font-size:13px;color:#0f0;margin:6px 0;min-height:18px;text-align:center}
#tcps{font-size:10px;color:#666;text-align:center}
#prog{width:200px;margin:8px auto}
.pb-bg{background:#1a1a2e;border-radius:4px;height:6px;overflow:hidden}
.pb-fi{height:100%;background:linear-gradient(90deg,#0ff,#0f0);border-radius:4px;width:0%;transition:.3s}
.pb-t{text-align:center;font-size:10px;color:#666;margin-top:3px}
footer{display:flex;background:#0d1025;border-top:1px solid rgba(0,255,255,.1);flex-shrink:0}
footer .tab{flex:1;text-align:center;padding:10px 4px;font-size:11px;cursor:pointer;color:#555;transition:.15s;-webkit-tap-highlight-color:transparent}
footer .tab.on{color:#0ff;text-shadow:0 0 5px #0ff}
#panel{position:fixed;top:0;left:0;width:100%;height:100%;background:#050510;z-index:50;display:none;flex-direction:column}
#panel.show{display:flex}
#ph{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid rgba(0,255,255,.1);background:#0d1025;min-height:40px}
#ph h2{flex:1;font-size:13px;letter-spacing:2px;text-shadow:0 0 8px #0ff}
#ph button{background:none;border:1px solid rgba(0,255,255,.3);color:#0ff;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer}
.ptabs{display:flex;border-bottom:1px solid rgba(0,255,255,.1);background:#0d1025;overflow-x:auto;flex-shrink:0}
.ptab{min-width:70px;text-align:center;padding:10px 8px;font-size:12px;cursor:pointer;color:#666;border-bottom:2px solid transparent}
.ptab.on{color:#0ff;border-color:#0ff}
#pc{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
.sec{font-size:10px;color:#0ff;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;margin-top:4px}
.card{background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.15);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer}
.card:active{background:rgba(0,255,255,.12)}
.card .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.card .nm{color:#0ff;font-weight:bold;font-size:13px}
.card .lv{color:#ffd700;font-size:11px}
.card .d{color:#777;font-size:11px;margin-bottom:3px}
.card .c{color:#ffd700;font-size:12px}
.card.can .c{color:#0f0}
.card.done{opacity:.5;cursor:default}
.boss{background:linear-gradient(135deg,rgba(255,0,68,.08),rgba(255,100,0,.06));border:1px solid rgba(255,0,68,.3);border-radius:8px;padding:10px;margin-bottom:6px}
.boss .bn{color:#f44;font-weight:bold;font-size:13px;margin-bottom:3px}
.boss .hp{background:#1a1a2e;border-radius:3px;height:6px;margin:3px 0;overflow:hidden}
.boss .hp-f{height:100%;background:linear-gradient(90deg,#f44,#ff4400);border-radius:3px;transition:.2s}
.boss .st{display:flex;justify-content:space-between;font-size:9px;color:#777}
.boss .rw{color:#ffd700;font-size:10px;margin-top:3px}
.atk-btn{width:100%;padding:10px;margin-top:6px;background:linear-gradient(135deg,#f44,#ff4400);border:none;border-radius:4px;color:#fff;font-weight:bold;font-size:13px;cursor:pointer}
.atk-btn:active{transform:scale(.97)}
.ach{display:flex;align-items:center;gap:6px;padding:6px;background:rgba(0,255,255,.03);border:1px solid rgba(0,255,255,.08);border-radius:4px;margin-bottom:3px}
.ach.done{border-color:#ffd700;background:rgba(255,215,0,.05)}
.ach .ic{font-size:18px}
.ach .inf{flex:1}
.ach .an{font-size:11px;color:#0ff}
.ach .ad{font-size:9px;color:#777}
.ach .ar{color:#ffd700;font-size:9px}
.strow{display:flex;justify-content:space-between;padding:6px 3px;border-bottom:1px solid rgba(0,255,255,.05);font-size:11px}
.strow .sl{color:#777}
.strow .sv{color:#0ff;font-weight:bold}
.shop{background:linear-gradient(135deg,rgba(0,255,255,.05),rgba(170,0,255,.05));border:1px solid rgba(0,255,255,.2);border-radius:8px;padding:10px;margin-bottom:6px;text-align:center}
.shop .si{font-size:24px;margin-bottom:3px}
.shop .sn{color:#0ff;font-weight:bold;font-size:13px}
.shop .sd{color:#777;font-size:11px;margin:3px 0}
.shop .sp{color:#ffd700;font-size:14px;font-weight:bold}
.shop button{margin-top:4px;background:linear-gradient(135deg,#0ff,#4af);border:none;color:#000;padding:6px 16px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer}
.danger{background:rgba(255,0,68,.1);border:1px solid rgba(255,0,68,.3);color:#f44;padding:6px;border-radius:4px;font-size:11px;cursor:pointer;margin-top:6px;width:100%}
#chat-scr{display:none;flex-direction:column;height:100%;background:#050510;position:fixed;top:0;left:0;width:100%;z-index:100}
#chat-scr.show{display:flex}
#chtabs{display:flex;border-bottom:1px solid rgba(0,255,255,.1);flex-shrink:0}
.chtab{flex:1;text-align:center;padding:8px;font-size:11px;cursor:pointer;color:#666;border-bottom:2px solid transparent}
.chtab.on{color:#0ff;border-color:#0ff}
#chmsgs{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.chmsg{margin-bottom:6px;padding:8px;background:rgba(0,255,255,.03);border-radius:6px;border-left:2px solid #0ff}
.chmsg .auth{color:#ffd700;font-weight:bold;font-size:10px}
.chmsg .txt{color:#ccc;font-size:12px;margin-top:2px;word-break:break-word;white-space:pre-wrap}
.chmsg .time{color:#555;font-size:9px;margin-top:2px;text-align:right}
.chmsg.me{border-left-color:#ffd700;background:rgba(255,215,0,.05)}
#chowli{font-size:10px;color:rgba(170,0,255,.7);text-align:center;padding:4px;display:none;background:rgba(170,0,255,.05)}
#chinp{display:flex;padding:8px;border-top:1px solid rgba(0,255,255,.1);gap:6px;flex-shrink:0}
#chinp input{flex:1;padding:10px;background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.2);border-radius:4px;color:#0ff;font-size:13px;outline:none}
#chinp button{padding:10px 14px;background:#0ff;border:none;border-radius:4px;color:#000;font-weight:bold;font-size:12px;cursor:pointer}
#bfight{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,16,.95);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#bfight.show{display:flex}
#bfs{font-size:64px;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#bfn{color:#f44;font-size:18px;font-weight:bold;text-shadow:0 0 12px #f44;margin:10px 0}
.fdmg{position:absolute;font-size:20px;font-weight:bold;color:#f44;animation:fdmg .8s ease-out forwards;pointer-events:none;z-index:201}
@keyframes fdmg{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:150;padding:20px}
.overlay.show{display:flex}
.overlay-box{background:#0d1025;border:1px solid #0ff;border-radius:12px;padding:15px;max-width:320px;width:100%;text-align:center}
.overlay-box h3{color:#0ff;font-size:14px;margin-bottom:8px}
.overlay-box p{color:#888;font-size:12px;margin-bottom:15px;line-height:1.5}
.overlay-box button{background:#0ff;border:none;color:#000;padding:6px 15px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;margin:3px}
</style>
</head>
<body>

<div id="login-scr">
  <h1>CYBER REALM</h1>
  <div class="sub">Futuristic Idle Game</div>
  <div class="fld">
    <input type="text" id="au" placeholder="Username" maxlength="20">
    <input type="password" id="ap" placeholder="Password" maxlength="30">
    <div class="msg" id="amsg"></div>
    <button class="btn" id="alogin">Login</button>
    <button class="btn2" id="areg">Register</button>
  </div>
</div>

<div id="game-scr">
  <header>
    <h1>CYBER REALM</h1>
    <div class="uinfo">
      <span class="dot"></span>
      <span class="nm" id="uname"></span>
      <button class="lout" id="lout">Exit</button>
    </div>
  </header>
  <div class="res">
    <span class="r"><span class="v" id="rc">0</span><span class="rt" id="rcR"></span></span>
    <span class="r"><span class="v" id="rn">0</span></span>
    <span class="r"><span class="v" id="rd">0</span></span>
    <span class="r"><span class="v" id="re">0</span></span>
  </div>
  <div id="area">
    <div id="tapz">
      <div id="parts"></div>
      <button id="tpbtn"><div class="in"><span class="bg">TAP</span></div></button>
      <div id="tpinfo"></div>
      <div id="tcps">per sec: 0 | taps: 0</div>
      <div id="prog"><div class="pb-bg"><div class="pb-fi" id="prog-fi"></div></div><div class="pb-t">Realm Lv.1</div></div>
    </div>
  </div>
  <footer>
    <div class="tab on" id="tgame"><div style="font-size:18px">G</div><div>Game</div></div>
    <div class="tab" id="tup"><div style="font-size:18px">U</div><div>Upgrades</div></div>
    <div class="tab" id="tbo"><div style="font-size:18px">B</div><div>Bosses</div></div>
    <div class="tab" id="tch"><div style="font-size:18px">C</div><div>Chat</div></div>
    <div class="tab" id="tst"><div style="font-size:18px">S</div><div>Stats</div></div>
  </footer>
</div>

<div id="panel">
  <div id="ph"><h2 id="panT">Upgrades</h2><button id="cPan">X</button></div>
  <div id="ptabs">
    <div class="ptab on" data-t="up">U</div>
    <div class="ptab" data-t="bo">B</div>
    <div class="ptab" data-t="ac">A</div>
    <div class="ptab" data-t="qu">Q</div>
    <div class="ptab" data-t="sh">S</div>
  </div>
  <div id="pc"></div>
</div>

<div id="chat-scr">
  <header><h1>Chat</h1><button class="lout" id="cChat">X</button></header>
  <div id="chtabs">
    <div class="chtab on" data-ct="g">Global</div>
    <div class="chtab" data-ct="o">OWL</div>
  </div>
  <div id="chmsgs"></div>
  <div id="chowli">OWL thinking...</div>
  <div id="chinp">
    <input type="text" id="chat-in" placeholder="Type message..." maxlength="200">
    <button id="chat-send">></button>
  </div>
</div>

<div id="bfight">
  <div id="bfs"></div>
  <div id="bfn">Boss</div>
  <div class="boss hp"><div class="hp-f" id="bf-hp"></div></div>
  <div class="boss st"><span id="bf-text">HP: 100/100</span></div>
  <button class="atk-btn" id="bf-atk">ATTACK</button>
</div>

<div class="overlay" id="ov">
  <div class="overlay-box">
    <h3 id="ovt"></h3>
    <p id="ovp"></p>
    <div id="ovb"></div>
  </div>
</div>

<noscript id="game-js"></noscript>
<script src="game.js"></noscript>
</body>
</html>
